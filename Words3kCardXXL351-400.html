<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词消消乐 - P351-400 版本</title>
    <style>
        :root {
            --bg-color: #FFFBE6;
            --card-ru-color: #FFECB3;
            --card-cn-color: #E1F5FE;
            --active-color: #FFD54F;
            --success-color: #81C784;
            --error-color: #E57373;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Calibri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 1000px;
            text-align: center;
            border: 5px solid #FFE082;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .timer {
            font-size: 24px;
            background: #FFF9C4;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            font-size: 32px;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card-number {
            font-size: 24px;
        }

        .card-ru { background-color: var(--card-ru-color); }
        .card-cn { background-color: var(--card-cn-color); }

        .card:hover { transform: scale(1.03); }

        .card.selected {
            background-color: var(--active-color);
            border-color: #FFA000;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.match-success {
            animation: disappear 0.5s forwards;
        }

        .card.match-error {
            background-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes disappear {
            to { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #victory-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .victory-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--active-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2 style="margin:0">俄语词汇消消乐 🎮</h2>
            <div class="timer">时间: <span id="time-val">0</span>s</div>
        </div>

        <div class="game-board">
            <div class="column" id="ru-col"></div>
            <div class="column" id="cn-col"></div>
        </div>
    </div>

    <div id="victory-mask">
        <div class="victory-box">
            <h1 style="font-size: 50px; margin: 0;">🎉 太棒了!</h1>
            <p style="font-size: 24px;">挑战用时: <span id="final-time">0</span> 秒</p>
            <button onclick="location.reload()" style="font-size: 24px; padding: 10px 30px; cursor: pointer; border-radius: 15px; border: none; background: var(--active-color);">重新开始</button>
        </div>
    </div>

    <script>
        const wordData = [
            {ru: "351 сюрприз", cn: "惊喜"}, {ru: "352 сосед", cn: "邻居"}, {ru: "353 ситуация", cn: "情况"},
            {ru: "354 зябкий", cn: "怕冷的/寒冷的"}, {ru: "355 козёл", cn: "山羊"}, {ru: "356 зелёный", cn: "绿色的"},
            {ru: "357 разить", cn: "打击; 毁灭"}, {ru: "358 щёлка", cn: "小缝; 裂缝"}, {ru: "359 ребёнок", cn: "小孩"},
            {ru: "360 дети", cn: "孩子们"}, {ru: "361 кепка", cn: "便帽"}, {ru: "362 кипа", cn: "堆、垛、捆、包"},
            {ru: "363 генеральный", cn: "一般的; 大概的"}, {ru: "364 ма́гия", cn: "魔法"}, {ru: "365 хедер", cn: "标题/收割台"},
            {ru: "366 дача", cn: "乡下木屋房"}, {ru: "367 клубника", cn: "草莓"}, {ru: "368 лук", cn: "洋葱"},
            {ru: "369 свёкла", cn: "甜菜"}, {ru: "370 картошка", cn: "土豆"}, {ru: "371 морковь", cn: "胡萝卜"},
            {ru: "372 студент", cn: "男学生"}, {ru: "373 студентка", cn: "女学生"}, {ru: "374 A у тебя?", cn: "你呢?"},
            {ru: "375 A у Вас?", cn: "您呢?"}, {ru: "376 До встречи", cn: "再见"}, {ru: "377 тоже", cn: "也"},
            {ru: "378 очень", cn: "很; 非常"}, {ru: "379 приятно", cn: "高兴; 舒服"}, {ru: "380 мне", cn: "我"},
            {ru: "381 давай", cn: "让/拿/来; 加油"}, {ru: "382 давайте", cn: "让我们开始吧"}, {ru: "383 познакомимся", cn: "认识"},
            {ru: "384 давайте познакомимся", cn: "让我们认识一下吧"}, {ru: "385 квас", cn: "格瓦丝饮料"}, {ru: "386 пожалуйста", cn: "请; 不客气"},
            {ru: "387 не за что", cn: "不客气; 没问题"}, {ru: "388 большое", cn: "大; 非常"}, {ru: "389 спасибо", cn: "谢谢"},
            {ru: "390 большое спасибо", cn: "非常感谢"}, {ru: "391 на здоровье", cn: "感谢她给你吃的"}, {ru: "392 извини", cn: "不好意思"},
            {ru: "393 извините", cn: "对不起（正式）"}, {ru: "394 ничего", cn: "没关系; 没什么"}, {ru: "395 прости", cn: "对不起; 原谅"},
            {ru: "396 простите", cn: "对不起（正式）"}, {ru: "397 дайте", cn: "给我"}, {ru: "398 меню", cn: "菜单"},
            {ru: "399 кола", cn: "可乐"}, {ru: "400 пицца", cn: "披萨"}
        ];

        let selectedWords = wordData.sort(() => 0.5 - Math.random()).slice(0, 10);
        let ruSelected = null;
        let cnSelected = null;
        let matchesFound = 0;
        let timer = 0;
        let isProcessing = false;

        const timerInterval = setInterval(() => {
            timer++;
            document.getElementById('time-val').innerText = timer;
        }, 1000);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'victory') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initBoard() {
            const ruCol = document.getElementById('ru-col');
            const cnCol = document.getElementById('cn-col');

            const rus = [...selectedWords].sort(() => Math.random() - 0.5);
            const cns = [...selectedWords].sort(() => Math.random() - 0.5);

            rus.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-ru';
                const parts = item.ru.split(' ');
                const number = parts[0];
                const word = parts.slice(1).join(' ');
                card.innerHTML = `<span class="card-number">${number}</span>-<span>${word}</span>`;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'ru');
                ruCol.appendChild(card);
            });

            cns.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-cn';
                card.innerText = item.cn;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'cn');
                cnCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (isProcessing || card.classList.contains('match-success')) return;

            playSound('click');

            if (type === 'ru') {
                if (ruSelected) ruSelected.classList.remove('selected');
                ruSelected = card;
            } else {
                if (cnSelected) cnSelected.classList.remove('selected');
                cnSelected = card;
            }
            card.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (ruSelected && cnSelected) {
                isProcessing = true;

                if (ruSelected.dataset.id === cnSelected.dataset.id) {
                    setTimeout(() => {
                        playSound('success');
                        ruSelected.classList.add('match-success');
                        cnSelected.classList.add('match-success');
                        ruSelected = null; cnSelected = null;
                        matchesFound++;
                        isProcessing = false;

                        if (matchesFound === selectedWords.length) winGame();
                    }, 200);
                } else {
                    setTimeout(() => {
                        playSound('error');
                        ruSelected.classList.add('match-error');
                        cnSelected.classList.add('match-error');

                        setTimeout(() => {
                            ruSelected.classList.remove('selected', 'match-error');
                            cnSelected.classList.remove('selected', 'match-error');
                            ruSelected = null; cnSelected = null;
                            isProcessing = false;
                        }, 400);
                    }, 200);
                }
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            playSound('victory');
            document.getElementById('final-time').innerText = timer;
            document.getElementById('victory-mask').style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
