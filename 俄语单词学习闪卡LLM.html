<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡 - 基础词汇100</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        /* 闪卡容器 */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        /* 正反面通用样式 */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 正面样式 */
        .card-front {
            color: var(--primary-color);
        }

        .card-front .word {
            font-size: 3rem;
            font-weight: bold;
        }

        /* 背面样式 */
        .card-back {
            background-color: var(--accent-color);
            color: white;
            transform: rotateY(180deg);
        }

        .card-back .phonetic {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-style: italic;
            opacity: 0.9;
        }

        .card-back .translation {
            font-size: 1.8rem;
            font-weight: 500;
        }

        /* 控制按钮 */
        .controls {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: var(--primary-color);
            color: white;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .progress {
            margin-top: 15px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>俄语单词闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <!-- 正面：俄语单词 -->
                <div class="card-face card-front">
                    <div class="word" id="word-front">бумага</div>
                </div>
                <!-- 背面：音标和中文 -->
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back">bumága</div>
                    <div class="translation" id="translation-back">纸</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">上一个</button>
            <button onclick="nextCard()">下一个</button>
            <button onclick="shuffleCards()">打乱顺序</button>
        </div>

        <div class="progress" id="progress">1 / 100</div>
    </div>

            { ru: "оно", ph: "a-nó", cn: "它" },
            { ru: "тот", ph: "dot", cn: "那个" },
            { ru: "ты", ph: "dei", cn: "你" },
            { ru: "это", ph: "éda", cn: "这 这是" },
            { ru: "этот", ph: "édət", cn: "这个" },

            { ru: "внук", ph: "v-nuk", cn: "孙子" },
            { ru: "гора", ph: "ga-dá", cn: "山" },

            { ru: "игра", ph: "ig-drá", cn: "游戏/比赛" },

            { ru: "климат", ph: "klí-mət", cn: "气候" },

            { ru: "дела", ph: "jié-la", cn: "事情（复数）" },
            { ru: "сумка", ph: "súm-ga", cn: "手提包/各种包" },
            { ru: "адрес", ph: "ád-lis", cn: "地址" },
            { ru: "берёза", ph: "bi-lju-zə", cn: "白桦树" },
            { ru: "газета", ph: "ga-jié-də", cn: "报纸" },
            { ru: "деньги", ph: "jín-gei", cn: "钱" },
            { ru: "откуда ты?", ph: "at-gú-də dei?", cn: "你从哪里来？" },
            { ru: "откуда вы?", ph: "at-gú-də vei?", cn: "您从哪里来？" },
            { ru: "рюкзак", ph: "ədjuk-záк", cn: "(双肩)背包" },
            { ru: "ёлка", ph: "il-ga", cn: "圣诞树 枞树" },
            { ru: "костюм", ph: "gaxi-jiúm", cn: "西装；连衣裙" },
            { ru: "ну и что？", ph: "nu yi ʃdo", cn: "那又怎样？" },
            { ru: "metro", ph: "mi-dló", cn: "地铁" },
            { ru: "музей", ph: "mu-zéy", cn: "博物馆" },
            { ru: "озеро", ph: "ó-jie-drə", cn: "湖" },
            { ru: "платье", ph: "blá-qie", cn: "连衣裙" },
            { ru: "портфель", ph: "badrt-féi-li", cn: "文件包 公文包" },
            { ru: "привет", ph: "bli-vjét", cn: "你好" },
            { ru: "река", ph: "əli-ká", cn: "河, 江" }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');

        function updateCard() {
            cardElement.classList.remove('flipped');
            setTimeout(() => {
                const current = words[currentIndex];
                wordFront.textContent = current.ru;
                phoneticBack.textContent = current.ph;
                translationBack.textContent = current.cn;
                progressText.textContent = `${currentIndex + 1} / ${words.length}`;
            }, 150);
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') flipCard();
            if (e.code === 'ArrowRight') nextCard();
            if (e.code === 'ArrowLeft') prevCard();
        });
    </script>
</body>
</html>
