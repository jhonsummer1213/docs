<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡 · 基础词汇</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 24px 16px;
            box-sizing: border-box;
            top: 0;
            left: 0;
        }

        .card-front {
            color: var(--primary-color);
            background: linear-gradient(145deg, #ffffff, #f0f3f5);
            position: relative;
            z-index: 2;
        }

        .card-front .word {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
            line-height: 1.2;
        }

        .card-front .index-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a8a9e;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .card-back {
            background: linear-gradient(145deg, #2c6b9e, #1f4b73);
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-back .phonetic {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .card-back .translation {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            max-width: 90%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1 0 auto;
            min-width: 80px;
        }

        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .progress {
            margin-top: 18px;
            color: #4a5b6e;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .hint {
            margin-top: 12px;
            color: #7a8a9e;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                width: 90vw;
                height: 220px;
            }
            .card-front .word {
                font-size: 2.2rem;
            }
            .card-back .translation {
                font-size: 1.6rem;
            }
            button {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-width: 60px;
            }
            .card-front .index-number {
                font-size: 0.7rem;
                top: 8px;
                left: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#2c3e50; font-weight: 400; letter-spacing: 1px;">🇷🇺 俄语闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="index-number" id="indexDisplay"></div>
                    <div class="word" id="word-front"></div>
                </div>
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back"></div>
                    <div class="translation" id="translation-back"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">◀ 上一张</button>
            <button onclick="nextCard()">下一张 ▶</button>
            <button onclick="shuffleCards()">🔀 打乱</button>
        </div>

        <div class="progress" id="progress"></div>
        <div class="hint">点击卡片翻转 · 键盘 ← → 翻页 · 空格翻转</div>
    </div>

    <script>
        const words = [
            { num: 451, ru: "сколько времени?", ph: "", cn: "几点了？" },
            { num: 452, ru: "во сколько？= когда?", ph: "", cn: "几点？什么时候" },
            { num: 453, ru: "в 3 часа", ph: "f dli qia-sa", cn: "在3点钟" },
            { num: 454, ru: "(один) час", ph: "(a-jín) qiá-s", cn: "1点钟" },
            { num: 455, ru: "два часа", ph: "d-va qiá-sa", cn: "2点钟(单数2格)" },
            { num: 456, ru: "три часа", ph: "dli qi-sá", cn: "3点钟(单数2格)" },
            { num: 457, ru: "четыре часа", ph: "qi-déi-lie qi-sa", cn: "4点钟(单数2格)" },
            { num: 458, ru: "пять часов", ph: "bia-qi qi-sóf", cn: "5点钟" },
            { num: 459, ru: "шесть часов", ph: "jes-qi qi-sóf", cn: "6点钟" },
            { num: 460, ru: "семь часов", ph: "xie-m qi-sóf", cn: "7点钟" },
            { num: 461, ru: "семья", ph: "xi-miyá", cn: "family 家庭" },
            { num: 462, ru: "восемь часов", ph: "vó-xim qi-sóf", cn: "8点钟" },
            { num: 463, ru: "дёвять часов", ph: "jié-viqi qi-sóf", cn: "9点钟" },
            { num: 464, ru: "дёсять часов", ph: "jié-xiqi qi-sóf", cn: "10点钟" },
            { num: 465, ru: "одиннадцать часов", ph: "ají-nə-tsə-qi", cn: "11点钟" },
            { num: 466, ru: "двенадцать чаасов", ph: "dvi-ná-tsə-qi", cn: "12点钟" },
            { num: 467, ru: "тринадцать", ph: "dli-ná-tsə-qi", cn: "数字：13" },
            { num: 468, ru: "четырнадцать", ph: "qi-déir-nə-tsə-qi", cn: "数字：14" },
            { num: 469, ru: "пятнадцать", ph: "bit-ná-tsə-qi", cn: "数字：15" },
            { num: 470, ru: "шестнадцать", ph: "jes-ná-tsə-qi", cn: "数字：16" },
            { num: 471, ru: "семнадцать", ph: "xim-ná-tsə-qi", cn: "数字：17" },
            { num: 472, ru: "восемнадцать", ph: "vəxim-ná-tsə-qi", cn: "数字：18" },
            { num: 473, ru: "девятнадцать", ph: "ji-vit-ná-tsə-qi", cn: "数字：19" },
            { num: 474, ru: "двадцать", ph: "dəvá-tsə-qi", cn: "数字：20" },
            { num: 475, ru: "тридцать", ph: "dlí-tsə-qi", cn: "数字：30" },
            { num: 476, ru: "сорок", ph: "só-dak", cn: "数字：40" },
            { num: 477, ru: "пятьдесят", ph: "biji-xiát", cn: "数字：50" },
            { num: 478, ru: "шестьдесят", ph: "jesji-xiát", cn: "数字：60" },
            { num: 479, ru: "семьдесят", ph: "xímji-xiat", cn: "数字：70" },
            { num: 480, ru: "восемьдесят", ph: "vóxim-ji-xiat", cn: "数字：80" },
            { num: 481, ru: "девяносто", ph: "jivi-nó-sda", cn: "数字：90" },
            { num: 482, ru: "сто", ph: "sdo", cn: "数字：100" },
            { num: 483, ru: "двести", ph: "dvié-xi-jie", cn: "数字：200" },
            { num: 484, ru: "триста", ph: "dlí-sda", cn: "数字：300" },
            { num: 485, ru: "четыреста", ph: "qi-déili-sda", cn: "数字：400" },
            { num: 486, ru: "пятьсот", ph: "bits-sót", cn: "数字：500" },
            { num: 487, ru: "шестьсот", ph: "jes-sót", cn: "数字：600" },
            { num: 488, ru: "семьсот", ph: "xim-sót", cn: "数字：700" },
            { num: 489, ru: "восемьсот", ph: "vəxim-sót", cn: "数字：800" },
            { num: 490, ru: "девятьсот", ph: "ji-vit-sót", cn: "数字：900" },
            { num: 491, ru: "тысяча", ph: "déi-xi-qia", cn: "数字：1千" },
            { num: 492, ru: "десять тысяч", ph: "jié-xiqi déi-xi-tj", cn: "数字：1万" },
            { num: 493, ru: "сто тысяч", ph: "sdo déi-xi-tj", cn: "十万" },
            { num: 494, ru: "миллион", ph: "mi-lión", cn: "百万" },
            { num: 495, ru: "нибудь", ph: "nʲi-bu-qi", cn: "any 一些/任何" },
            { num: 496, ru: "что нибудь ещё", ph: "j-do nʲi-bu-qi i-xiu", cn: "还再需要什么吗" },
            { num: 497, ru: "это всё", ph: "edə f-xiu", cn: "就这样/仅此而已" },
            { num: 498, ru: "красотка", ph: "kdra-sót-ka", cn: "美女" },
            { num: 499, ru: "красиво", ph: "kdra-xí-va", cn: "漂亮" },
            { num: 500, ru: "как красиво", ph: "", cn: "真漂亮啊!" }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');
        const indexDisplay = document.getElementById('indexDisplay');

        function updateCard() {
            cardElement.classList.remove('flipped');
            const current = words[currentIndex];
            wordFront.textContent = current.ru;
            phoneticBack.textContent = current.ph;
            translationBack.textContent = current.cn;
            indexDisplay.textContent = current.num;
            progressText.textContent = `${currentIndex + 1} / ${words.length}`;
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
