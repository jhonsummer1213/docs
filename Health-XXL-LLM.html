<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词消消乐 - 课堂版</title>
    <style>
        :root {
            --bg-color: #FFFBE6; /* 浅黄色背景 */
            --card-ru-color: #FFECB3; /* 俄文卡片色 */
            --card-cn-color: #E1F5FE; /* 中文卡片色 */
            --active-color: #FFD54F;
            --success-color: #81C784;
            --error-color: #E57373;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Calibri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        /* 主圆角矩形容器 */
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 1000px;
            text-align: center;
            border: 5px solid #FFE082;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .timer {
            font-size: 24px;
            background: #FFF9C4;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* 两栏布局 */
        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 卡片样式 */
        .card {
            font-size: 32px; /* 要求字号32 */
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card-ru { background-color: var(--card-ru-color); }
        .card-cn { background-color: var(--card-cn-color); }

        .card:hover { transform: scale(1.03); }
        
        .card.selected {
            background-color: var(--active-color);
            border-color: #FFA000;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.match-success {
            animation: disappear 0.5s forwards;
        }

        .card.match-error {
            background-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes disappear {
            to { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 胜利弹窗 */
        #victory-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .victory-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--active-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2 style="margin:0">俄语词汇消消乐 🎮</h2>
            <div class="timer">时间: <span id="time-val">0</span>s</div>
        </div>
        
        <div class="game-board">
            <div class="column" id="ru-col"></div>
            <div class="column" id="cn-col"></div>
        </div>
    </div>

    <div id="victory-mask">
        <div class="victory-box">
            <h1 style="font-size: 50px; margin: 0;">🎉 太棒了!</h1>
            <p style="font-size: 24px;">挑战用时: <span id="final-time">0</span> 秒</p>
            <button onclick="location.reload()" style="font-size: 24px; padding: 10px 30px; cursor: pointer; border-radius: 15px; border: none; background: var(--active-color);">重新开始</button>
        </div>
    </div>

    <script>
        // 提取自来源材料的单词数据 (100组)
        const wordData = [
            {ru: "бумага", cn: "纸"}, {ru: "дом", cn: "房子"}, {ru: "кинó", cn: "电影"}, 
			{ru: "Заба́вная", cn: "有趣的/好玩的"},{ru: "исто́рия", cn: "故事/历史/事件"},{ru: "про", cn: "关于/涉及/为了"},
			{ru: "витами́ны", cn: "维生素/维他命"},{ru: "Весно́й", cn: "在春天"},{ru: "y", cn: "在某人那里/某人有……"},
			{ru: "О́ли", cn: "奥利娅的"},
{ru: "бы́ло", cn: "曾有/曾经是"},
{ru: "мно́го", cn: "很多"},
{ru: "рабо́ты", cn: "工作"},
{ru: "саду́", cn: "花园里"},
{ru: "Она́", cn: "她"},
{ru: "посади́ла", cn: "种下"},
{ru: "цвето́в", cn: "花朵"},
{ru: "овоще́й", cn: "蔬菜"},
{ru: "че́рез", cn: "经过/……之后"},
{ru: "не́сколько", cn: "几个"},
{ru: "дней", cn: "天数/日子"},
{ru: "почу́вствовала", cn: "感觉到"},
{ru: "уста́лость", cn: "疲倦"},
{ru: "поду́мала", cn: "思考/想"},
{ru: "хвата́ет", cn: "足够/缺少"},
{ru: "сил", cn: "体力/力量"},
{ru: "реши́ла", cn: "决定"},
{ru: "купи́ть", cn: "买"},
{ru: "апте́ке", cn: "药店"},
{ru: "продаве́ц", cn: "店员/售货员"},
{ru: "показа́л", cn: "展示/给……看"},
{ru: "ра́зные", cn: "各种各样的"},
{ru: "вы́брала", cn: "挑选"},
{ru: "цветны́е", cn: "彩色的"},
{ru: "табле́тки", cn: "药片"},
{ru: "наде́ялась", cn: "希望"},
{ru: "помо́гут", cn: "将帮助"},
{ru: "быть", cn: "是/成为"},
{ru: "здоро́вой", cn: "健康的"},
{ru: "си́льной", cn: "强壮的"},
{ru: "сле́дующий", cn: "接下来的"},
{ru: "день", cn: "日子/天"},
{ru: "приняла́", cn: "服用"},
{ru: "пошла́", cn: "步行去"},
{ru: "час", cn: "小时"},
{ru: "заме́тила", cn: "注意到"},
{ru: "раста́яли", cn: "融化了"},
{ru: "рту", cn: "嘴里"},
{ru: "бы́ли", cn: "曾是"},
{ru: "ки́слыми", cn: "酸的"},
{ru: "сла́дкими", cn: "甜的"},
{ru: "одновреме́нно", cn: "同时"},
{ru: "засмея́лась", cn: "笑了起来"},
{ru: "ожида́ла", cn: "预料/期待"},
{ru: "вку́са", cn: "味道"},
{ru: "Ве́чером", cn: "在晚上"},
{ru: "пришёл", cn: "来到"},
{ru: "друг", cn: "朋友"},
{ru: "уви́дел", cn: "看到"},
{ru: "сказа́л", cn: "说"},
{ru: "то́же", cn: "也"},
{ru: "хо́чет", cn: "想要"},
{ru: "попро́бовать", cn: "尝试/品尝"},
{ru: "дала́", cn: "给了"},
{ru: "о́ба", cn: "两者/两个都"},
{ru: "смея́лись", cn: "笑了"},
{ru: "вспомина́я", cn: "回想起"},
{ru: "необы́чный", cn: "不同寻常的"},
{ru: "поняла́", cn: "明白"},
{ru: "здоро́вье", cn: "健康"},
{ru: "настрое́ние", cn: "心情"},
{ru: "иногда́", cn: "有时"},
{ru: "но́вые", cn: "新的"},
{ru: "о́пыты", cn: "体验/经验"},
{ru: "де́лают", cn: "使/做"},
{ru: "жизнь", cn: "生活"},
{ru: "интере́снее", cn: "更有趣"},
        ];

        // 随机抽取10组单词进行游戏
        let selectedWords = wordData.sort(() => 0.5 - Math.random()).slice(0, 10);
        let ruSelected = null;
        let cnSelected = null;
        let matchesFound = 0;
        let timer = 0;
        let isProcessing = false;

        // 计时器
        const timerInterval = setInterval(() => {
            timer++;
            document.getElementById('time-val').innerText = timer;
        }, 1000);

        // 程序化音频生成器 (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'click') { // 点击音
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'error') { // 错误音
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'success') { // 成功音
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'victory') { // 胜利音
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        // 初始化界面
        function initBoard() {
            const ruCol = document.getElementById('ru-col');
            const cnCol = document.getElementById('cn-col');

            // 俄文随机排序
            const rus = [...selectedWords].sort(() => Math.random() - 0.5);
            // 中文随机排序
            const cns = [...selectedWords].sort(() => Math.random() - 0.5);

            rus.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-ru';
                card.innerText = item.ru;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'ru');
                ruCol.appendChild(card);
            });

            cns.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-cn';
                card.innerText = item.cn;
                card.dataset.id = item.ru; // 绑定RU作为匹配标识
                card.onclick = () => selectCard(card, 'cn');
                cnCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (isProcessing || card.classList.contains('match-success')) return;

            playSound('click');

            if (type === 'ru') {
                if (ruSelected) ruSelected.classList.remove('selected');
                ruSelected = card;
            } else {
                if (cnSelected) cnSelected.classList.remove('selected');
                cnSelected = card;
            }
            card.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (ruSelected && cnSelected) {
                isProcessing = true;
                
                if (ruSelected.dataset.id === cnSelected.dataset.id) {
                    // 匹配成功
                    setTimeout(() => {
                        playSound('success');
                        ruSelected.classList.add('match-success');
                        cnSelected.classList.add('match-success');
                        ruSelected = null; cnSelected = null;
                        matchesFound++;
                        isProcessing = false;

                        if (matchesFound === selectedWords.length) winGame();
                    }, 200);
                } else {
                    // 匹配失败
                    setTimeout(() => {
                        playSound('error');
                        ruSelected.classList.add('match-error');
                        cnSelected.classList.add('match-error');
                        
                        setTimeout(() => {
                            ruSelected.classList.remove('selected', 'match-error');
                            cnSelected.classList.remove('selected', 'match-error');
                            ruSelected = null; cnSelected = null;
                            isProcessing = false;
                        }, 400);
                    }, 200);
                }
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            playSound('victory');
            document.getElementById('final-time').innerText = timer;
            document.getElementById('victory-mask').style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
