<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词消消乐 - P1-50 版本</title>
    <style>
        :root {
            --bg-color: #FFFBE6;
            --card-ru-color: #FFECB3;
            --card-cn-color: #E1F5FE;
            --active-color: #FFD54F;
            --success-color: #81C784;
            --error-color: #E57373;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Calibri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 1000px;
            text-align: center;
            border: 5px solid #FFE082;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .timer {
            font-size: 24px;
            background: #FFF9C4;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            font-size: 32px;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card-number {
            font-size: 24px;
        }

        .card-ru { background-color: var(--card-ru-color); }
        .card-cn { background-color: var(--card-cn-color); }

        .card:hover { transform: scale(1.03); }
        
        .card.selected {
            background-color: var(--active-color);
            border-color: #FFA000;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.match-success {
            animation: disappear 0.5s forwards;
        }

        .card.match-error {
            background-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes disappear {
            to { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #victory-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .victory-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--active-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2 style="margin:0">俄语词汇消消乐 🎮</h2>
            <div class="timer">时间: <span id="time-val">0</span>s</div>
        </div>
        
        <div class="game-board">
            <div class="column" id="ru-col"></div>
            <div class="column" id="cn-col"></div>
        </div>
    </div>

    <div id="victory-mask">
        <div class="victory-box">
            <h1 style="font-size: 50px; margin: 0;">🎉 太棒了!</h1>
            <p style="font-size: 24px;">挑战用时: <span id="final-time">0</span> 秒</p>
            <button onclick="location.reload()" style="font-size: 24px; padding: 10px 30px; cursor: pointer; border-radius: 15px; border: none; background: var(--active-color);">重新开始</button>
        </div>
    </div>

    <script>
        const wordData = [
            {ru: "301 бэби", cn: "宝宝/婴儿"},
            {ru: "302 быть", cn: "在；是"},
            {ru: "303 фабрика", cn: "工厂 (轻工业)"},
            {ru: "304 фокус", cn: "焦点"},
            {ru: "305 фэйл", cn: "Fail失败"},
            {ru: "306 файл", cn: "File文件"},
            {ru: "307 вовремя", cn: "及时"},
            {ru: "308 вуз", cn: "高校"},
            {ru: "309 ветер/вэр", cn: "风；微风"},
            {ru: "310 таблица", cn: "表格"},
            {ru: "311 интернет", cn: "互联网"},
            {ru: "312 до", cn: "在...之前"},
            {ru: "313 думать", cn: "想"},
            {ru: "314 конечно", cn: "Certainly 当然"},
            {ru: "315 соус", cn: "调味汁"},
            {ru: "316 сэр", cn: "先生；爵士"},
            {ru: "317 зов", cn: "号召"},
            {ru: "318 зыбь", cn: "涟漪/微波/细浪"},
            {ru: "319 шаг", cn: "脚步; 步幅"},
            {ru: "320 шоу", cn: "表演"},
            {ru: "321 шутка", cn: "笑话"},
            {ru: "322 жох", cn: "狡猾的人；滑头"},
            {ru: "323 цоколь", cn: "底座/灯座/灯头"},
            {ru: "324 французский", cn: "法语/法国(人)的"},
            {ru: "325 цыпка", cn: "母鸡"},
            {ru: "326 щадить", cn: "宽恕/空闲的/节省"},
            {ru: "327 щунять", cn: "责备/训斥"},
            {ru: "328 чопорный", cn: "隆重的"},
            {ru: "329 кукушка", cn: "布谷鸟/杜鹃鸟"},
            {ru: "330 характер", cn: "性格"},
            {ru: "331 хобби", cn: "业余爱好；嗜好"},
            {ru: "332 художник", cn: "艺术家，画家"},
            {ru: "333 мёт", cn: "蜂蜜，蜜酒"},
            {ru: "334 сожалеть", cn: "遗憾/抱歉/后悔"},
            {ru: "335 минута", cn: "分钟"},
            {ru: "336 нёбо", cn: "颚/味蕾"},
            {ru: "337 нюх", cn: "嗅觉/香气/风采"},
            {ru: "338 низкий", cn: "矮的/低沉/微弱"},
            {ru: "339 ряд", cn: "行；列"},
            {ru: "340 рёв", cn: "怒吼，嚎叫"},
            {ru: "341 рюмка", cn: "高脚酒杯"},
            {ru: "342 решать", cn: "决定"},
            {ru: "343 тяжкий", cn: "重的/困难"},
            {ru: "344 тюлень", cn: "海豹/密封/印章"},
            {ru: "345 тип", cn: "种类/型号"},
            {ru: "346 сдёргивать", cn: "拉下来/拉动"},
            {ru: "347 дюна", cn: "沙丘"},
            {ru: "348 диплом", cn: "证书/奖品"},
            {ru: "349 ой, всё", cn: "哎呀，算了！"},
            {ru: "350 весёлый", cn: "开心的/好玩的"}
        ];

        let selectedWords = wordData.sort(() => 0.5 - Math.random()).slice(0, 10);
        let ruSelected = null;
        let cnSelected = null;
        let matchesFound = 0;
        let timer = 0;
        let isProcessing = false;

        const timerInterval = setInterval(() => {
            timer++;
            document.getElementById('time-val').innerText = timer;
        }, 1000);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'victory') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initBoard() {
            const ruCol = document.getElementById('ru-col');
            const cnCol = document.getElementById('cn-col');

            const rus = [...selectedWords].sort(() => Math.random() - 0.5);
            const cns = [...selectedWords].sort(() => Math.random() - 0.5);

            rus.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-ru';
                const parts = item.ru.split(' ');
                const number = parts[0];
                const word = parts.slice(1).join(' ');
                card.innerHTML = `<span class="card-number">${number}</span>-<span>${word}</span>`;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'ru');
                ruCol.appendChild(card);
            });

            cns.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-cn';
                card.innerText = item.cn;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'cn');
                cnCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (isProcessing || card.classList.contains('match-success')) return;

            playSound('click');

            if (type === 'ru') {
                if (ruSelected) ruSelected.classList.remove('selected');
                ruSelected = card;
            } else {
                if (cnSelected) cnSelected.classList.remove('selected');
                cnSelected = card;
            }
            card.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (ruSelected && cnSelected) {
                isProcessing = true;
                
                if (ruSelected.dataset.id === cnSelected.dataset.id) {
                    setTimeout(() => {
                        playSound('success');
                        ruSelected.classList.add('match-success');
                        cnSelected.classList.add('match-success');
                        ruSelected = null; cnSelected = null;
                        matchesFound++;
                        isProcessing = false;

                        if (matchesFound === selectedWords.length) winGame();
                    }, 200);
                } else {
                    setTimeout(() => {
                        playSound('error');
                        ruSelected.classList.add('match-error');
                        cnSelected.classList.add('match-error');
                        
                        setTimeout(() => {
                            ruSelected.classList.remove('selected', 'match-error');
                            cnSelected.classList.remove('selected', 'match-error');
                            ruSelected = null; cnSelected = null;
                            isProcessing = false;
                        }, 400);
                    }, 200);
                }
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            playSound('victory');
            document.getElementById('final-time').innerText = timer;
            document.getElementById('victory-mask').style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
