<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡 · 基础词汇</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 24px 16px;
            box-sizing: border-box;
            top: 0;
            left: 0;
        }

        .card-front {
            color: var(--primary-color);
            background: linear-gradient(145deg, #ffffff, #f0f3f5);
            position: relative;
            z-index: 2;
        }

        .card-front .word {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
            line-height: 1.2;
        }

        .card-front .index-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a8a9e;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .card-back {
            background: linear-gradient(145deg, #2c6b9e, #1f4b73);
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-back .phonetic {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .card-back .translation {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            max-width: 90%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1 0 auto;
            min-width: 80px;
        }

        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .progress {
            margin-top: 18px;
            color: #4a5b6e;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .hint {
            margin-top: 12px;
            color: #7a8a9e;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                width: 90vw;
                height: 220px;
            }
            .card-front .word {
                font-size: 2.2rem;
            }
            .card-back .translation {
                font-size: 1.6rem;
            }
            button {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-width: 60px;
            }
            .card-front .index-number {
                font-size: 0.7rem;
                top: 8px;
                left: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#2c3e50; font-weight: 400; letter-spacing: 1px;">🇷🇺 俄语闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="index-number" id="indexDisplay"></div>
                    <div class="word" id="word-front"></div>
                </div>
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back"></div>
                    <div class="translation" id="translation-back"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">◀ 上一张</button>
            <button onclick="nextCard()">下一张 ▶</button>
            <button onclick="shuffleCards()">🔀 打乱</button>
        </div>

        <div class="progress" id="progress"></div>
        <div class="hint">点击卡片翻转 · 键盘 ← → 翻页 · 空格翻转</div>
    </div>

    <script>
        const words = [
            { num: 201, ru: "щи", ph: "xi", cn: "白菜汤" },
            { num: 202, ru: "борщ", ph: "bodr-ʃ", cn: "罗宋汤" },
            { num: 203, ru: "врач", ph: "vdrá-qi", cn: "医生" },
            { num: 204, ru: "врачи", ph: "vdra-qi:", cn: "医生（复数）" },
            { num: 205, ru: "кот", ph: "got", cn: "猫" },
            { num: 206, ru: "коты", ph: "ka-déi", cn: "猫（复数）" },
            { num: 207, ru: "банан", ph: "ba-nán", cn: "香蕉" },
            { num: 208, ru: "бананы", ph: "ba-ná-nei", cn: "香蕉（复数）" },
            { num: 209, ru: "стих", ph: "s-ji-hə", cn: "诗; 诗歌" },
            { num: 210, ru: "стихи", ph: "s-ji-hí", cn: "诗（复数）" },
            { num: 211, ru: "нож", ph: "no-1", cn: "小刀; 折叠刀" },
            { num: 212, ru: "ножи", ph: "na-rí", cn: "小刀（复数）" },
            { num: 213, ru: "ручка", ph: "adrú-qi-ka", cn: "钢笔; 圆珠笔" },
            { num: 214, ru: "ручки", ph: "adrú-qi-gi", cn: "圆珠笔（复数）" },
            { num: 215, ru: "гусь", ph: "gú-xi", cn: "鹅" },
            { num: 216, ru: "гуси", ph: "gú-xei", cn: "鹅（复数）" },
            { num: 217, ru: "дыня", ph: "déi-ni-ya", cn: "甜瓜; 香瓜" },
            { num: 218, ru: "мыло", ph: "déi-la", cn: "肥皂" },
            { num: 219, ru: "школа", ph: "f-gó-la", cn: "中小学校" },
            { num: 220, ru: "в школе", ph: "f-gó-lie", cn: "在学校" },
            { num: 221, ru: "дядя", ph: "jiá-jia", cn: "伯伯; 叔叔" },
            { num: 222, ru: "бабушка", ph: "bá-bu1-ka", cn: "奶奶; 外婆" },
            { num: 223, ru: "дедушка", ph: "jié-du1-ka", cn: "爷爷; 外公" },
            { num: 224, ru: "отец", ph: "a-jié-ts", cn: "父亲" },
            { num: 225, ru: "мать", ph: "ma-qi", cn: "母亲; 妈妈" },
            { num: 226, ru: "брат", ph: "b-dat", cn: "兄弟; 哥们" },
            { num: 227, ru: "сестра", ph: "xis-drá", cn: "姐; 妹" },
            { num: 228, ru: "сын", ph: "sən", cn: "儿子" },
            { num: 229, ru: "дочь", ph: "do-qi", cn: "女儿" },
            { num: 230, ru: "выставка", ph: "véis-daf-ka", cn: "展览" },
            { num: 231, ru: "стакан", ph: "sda-kán", cn: "玻璃杯; 杯子" },
            { num: 232, ru: "банк", ph: "bank", cn: "银行" },
            { num: 233, ru: "космонавт", ph: "kəs-ma-náft", cn: "宇航员" },
            { num: 234, ru: "кофта", ph: "kóf-də", cn: "(女)上衣" },
            { num: 235, ru: "фонтан", ph: "fan-dán", cn: "喷泉" },
            { num: 236, ru: "автобус", ph: "af-dó-bus", cn: "公共汽车" },
            { num: 237, ru: "шкаф", ph: "f-gaf", cn: "柜子; 衣柜" },
            { num: 238, ru: "груша", ph: "glú-fə", cn: "梨" },
            { num: 239, ru: "сайт", ph: "sait", cn: "网站" },
            { num: 240, ru: "Европа", ph: "iv-ló-ba", cn: "欧洲" },
            { num: 241, ru: "новый", ph: "nó-veit", cn: "新的" },
            { num: 242, ru: "старый", ph: "sdá-deit", cn: "旧的; 古老的" },
            { num: 243, ru: "какой", ph: "ka-kói", cn: "什么样的" },
            { num: 244, ru: "поезд", ph: "bó-ist", cn: "火车" },
            { num: 245, ru: "Киев", ph: "gif", cn: "基辅" },
            { num: 246, ru: "по-китайски", ph: "bəki-dáyi-ski", cn: "用汉语/中式地" },
            { num: 247, ru: "по-русски", ph: "ba lú-ski", cn: "说(用)俄语/俄式地" },
            { num: 248, ru: "по-английски", ph: "ban-glí-ski", cn: "用英语/英式地" },
            { num: 249, ru: "по-новому", ph: "ba-nóvə-mu", cn: "以新的方式" },
            { num: 250, ru: "по-старому", ph: "basdá-də-mu", cn: "和以前一样" }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');
        const indexDisplay = document.getElementById('indexDisplay');

        function updateCard() {
            cardElement.classList.remove('flipped');
            const current = words[currentIndex];
            wordFront.textContent = current.ru;
            phoneticBack.textContent = current.ph;
            translationBack.textContent = current.cn;
            indexDisplay.textContent = current.num;
            progressText.textContent = `${current.num} / ${words.length + 200}`;
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
