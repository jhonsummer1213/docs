<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词消消乐 - 60词版本</title>
    <style>
        :root {
            --bg-color: #FFFBE6;
            --card-ru-color: #FFECB3;
            --card-cn-color: #E1F5FE;
            --active-color: #FFD54F;
            --success-color: #81C784;
            --error-color: #E57373;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Calibri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 1000px;
            text-align: center;
            border: 5px solid #FFE082;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .timer {
            font-size: 24px;
            background: #FFF9C4;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            font-size: 24px;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            word-break: break-word;
            text-align: center;
        }
        .card-number {
            font-size: 22px;
        }

        .card-ru { background-color: var(--card-ru-color); }
        .card-cn { background-color: var(--card-cn-color); }

        .card:hover { transform: scale(1.03); }
        
        .card.selected {
            background-color: var(--active-color);
            border-color: #FFA000;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.match-success {
            animation: disappear 0.5s forwards;
        }

        .card.match-error {
            background-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes disappear {
            to { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #victory-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .victory-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--active-color);
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .card {
                font-size: 18px;
                padding: 8px 12px;
            }
            .card-number {
                font-size: 18px;
            }
            .game-board {
                gap: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .card {
                font-size: 16px;
                padding: 6px 10px;
                min-height: 40px;
            }
            .card-number {
                font-size: 16px;
            }
            .timer {
                font-size: 18px;
                padding: 3px 12px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2 style="margin:0">英语词汇消消乐 🎮</h2>
            <div class="timer">时间: <span id="time-val">0</span>s</div>
        </div>
        
        <div class="game-board">
            <div class="column" id="ru-col"></div>
            <div class="column" id="cn-col"></div>
        </div>
    </div>

    <div id="victory-mask">
        <div class="victory-box">
            <h1 style="font-size: 50px; margin: 0;">🎉 太棒了!</h1>
            <p style="font-size: 24px;">挑战用时: <span id="final-time">0</span> 秒</p>
            <button onclick="location.reload()" style="font-size: 24px; padding: 10px 30px; cursor: pointer; border-radius: 15px; border: none; background: var(--active-color);">重新开始</button>
        </div>
    </div>

    <script>
        const wordData = [
            {ru: "1 sand", cn: "n. 沙；沙子"},
            {ru: "2 suit", cn: "n. 套装；西服"},
            {ru: "3 exhibition", cn: "n. 展览；展出"},
            {ru: "4 stand", cn: "n. (展示或推介物品的)桌，台，摊位"},
            {ru: "5 sandwich", cn: "n. 三明治"},
            {ru: "6 biscuit", cn: "n. 饼干"},
            {ru: "7 leather", cn: "n. 皮革"},
            {ru: "8 blouse", cn: "n. (女式)短上衣，衬衫"},
            {ru: "9 be all ears", cn: "洗耳恭听"},
            {ru: "10 lunar", cn: "adj. 月球的；月亮的"},
            {ru: "11 clay", cn: "n. 粘土；陶土"},
            {ru: "12 beer", cn: "n. 啤酒"},
            {ru: "13 sausage", cn: "n. 香肠"},
            {ru: "14 suppose", cn: "v. (根据所知)认为，推断，料想"},
            {ru: "15 mirror", cn: "n. 镜子；写照"},
            {ru: "16 exist", cn: "v. 存在"},
            {ru: "17 identity", cn: "n. 身份"},
            {ru: "18 unite", cn: "v. 团结"},
            {ru: "19 firstly", cn: "adv. 首先"},
            {ru: "20 identify with", cn: "认同；支持；与……有密切关系"},
            {ru: "21 relate to", cn: "理解；认同；与……产生共鸣"},
            {ru: "22 ancestor", cn: "n. 祖先"},
            {ru: "23 value", cn: "n. 价值 v. 重视；珍视"},
            {ru: "24 achieve", cn: "v. 靠长期努力达到（某目标、地位、标准）"},
            {ru: "25 harmony", cn: "n. 和谐；协调"},
            {ru: "26 conclude", cn: "v. 得出结论"},
            {ru: "27 die out", cn: "消失；灭绝"},
            {ru: "28 spoon", cn: "n. 勺；匙"},
            {ru: "29 construct", cn: "v. 修建；建立"},
            {ru: "30 sphere", cn: "n. 球；球体；球形"},
            {ru: "31 locate", cn: "v. 把……安置在"},
            {ru: "32 steel", cn: "n. 钢；钢铁"},
            {ru: "33 limit", cn: "n. 限度；限制；界线"},
            {ru: "34 combine", cn: "v. (使)结合，组合，联合，混合"},
            {ru: "35 modernist", cn: "adj. (尤指艺术的)现代主义的 n. (尤指艺术的)现代主义者"},
            {ru: "36 feature", cn: "n. 特色；特征"},
            {ru: "37 skylight", cn: "n. (房顶的)天窗"},
            {ru: "38 concrete", cn: "n. 混凝土"},
            {ru: "39 pavilion", cn: "n. (公园中的)亭，阁"},
            {ru: "40 axis", cn: "n. 轴(线)；中心线"},
            {ru: "41 northern", cn: "adj. 北方的；北部的"},
            {ru: "42 inner", cn: "adj. 内部的"},
            {ru: "43 court", cn: "n. 庭院"},
            {ru: "44 southern", cn: "adj. 南方的；南部的"},
            {ru: "45 outer", cn: "adj. 外部的"},
            {ru: "46 supreme", cn: "adj. (级别或地位)最高的，至高无上的"},
            {ru: "47 emperor", cn: "n. 皇帝"},
            {ru: "48 pillar", cn: "n. 柱子，支柱 (尤指作装饰的)"},
            {ru: "49 tile", cn: "n. 瓷砖；瓦片"},
            {ru: "50 slippery", cn: "adj. 滑的"},
            {ru: "51 structure", cn: "n. 结构；构造"},
            {ru: "52 nail", cn: "n. 钉子"},
            {ru: "53 yet", cn: "conj. 但是；然而 adv. (用于否定句和疑问句，谈论尚未发生但可能发生的事)"},
            {ru: "54 upturned", cn: "adj. 向上翻的；朝上翻的"},
            {ru: "55 dragon", cn: "n. 龙"},
            {ru: "56 symbol", cn: "n. 象征；符号"},
            {ru: "57 pride", cn: "n. 自豪；骄傲"},
            {ru: "58 stone", cn: "n. 石头；石块；石子"},
            {ru: "59 jade", cn: "n. 玉；翡翠"},
            {ru: "60 carve", cn: "v. 雕刻；切开"}
        ];

        let selectedWords = wordData.sort(() => 0.5 - Math.random()).slice(0, 10);
        let ruSelected = null;
        let cnSelected = null;
        let matchesFound = 0;
        let timer = 0;
        let isProcessing = false;

        const timerInterval = setInterval(() => {
            timer++;
            document.getElementById('time-val').innerText = timer;
        }, 1000);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'victory') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initBoard() {
            const ruCol = document.getElementById('ru-col');
            const cnCol = document.getElementById('cn-col');

            const rus = [...selectedWords].sort(() => Math.random() - 0.5);
            const cns = [...selectedWords].sort(() => Math.random() - 0.5);

            rus.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-ru';
                const parts = item.ru.split(' ');
                const number = parts[0];
                const word = parts.slice(1).join(' ');
                card.innerHTML = `<span class="card-number">${number}</span>-<span>${word}</span>`;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'ru');
                ruCol.appendChild(card);
            });

            cns.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-cn';
                card.innerText = item.cn;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'cn');
                cnCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (isProcessing || card.classList.contains('match-success')) return;

            playSound('click');

            if (type === 'ru') {
                if (ruSelected) ruSelected.classList.remove('selected');
                ruSelected = card;
            } else {
                if (cnSelected) cnSelected.classList.remove('selected');
                cnSelected = card;
            }
            card.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (ruSelected && cnSelected) {
                isProcessing = true;
                
                if (ruSelected.dataset.id === cnSelected.dataset.id) {
                    setTimeout(() => {
                        playSound('success');
                        ruSelected.classList.add('match-success');
                        cnSelected.classList.add('match-success');
                        ruSelected = null; cnSelected = null;
                        matchesFound++;
                        isProcessing = false;

                        if (matchesFound === selectedWords.length) winGame();
                    }, 200);
                } else {
                    setTimeout(() => {
                        playSound('error');
                        ruSelected.classList.add('match-error');
                        cnSelected.classList.add('match-error');
                        
                        setTimeout(() => {
                            ruSelected.classList.remove('selected', 'match-error');
                            cnSelected.classList.remove('selected', 'match-error');
                            ruSelected = null; cnSelected = null;
                            isProcessing = false;
                        }, 400);
                    }, 200);
                }
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            playSound('victory');
            document.getElementById('final-time').innerText = timer;
            document.getElementById('victory-mask').style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
