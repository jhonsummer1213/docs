<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词消消乐 - 55词版本</title>
    <style>
        :root {
            --bg-color: #FFFBE6;
            --card-ru-color: #FFECB3;
            --card-cn-color: #E1F5FE;
            --active-color: #FFD54F;
            --success-color: #81C784;
            --error-color: #E57373;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Calibri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 1000px;
            text-align: center;
            border: 5px solid #FFE082;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .timer {
            font-size: 24px;
            background: #FFF9C4;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            font-size: 26px;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            word-break: break-word;
            text-align: center;
        }
        .card-number {
            font-size: 24px;
        }

        .card-ru { background-color: var(--card-ru-color); }
        .card-cn { background-color: var(--card-cn-color); }

        .card:hover { transform: scale(1.03); }
        
        .card.selected {
            background-color: var(--active-color);
            border-color: #FFA000;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.match-success {
            animation: disappear 0.5s forwards;
        }

        .card.match-error {
            background-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes disappear {
            to { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #victory-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .victory-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--active-color);
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .card {
                font-size: 20px;
                padding: 8px 12px;
            }
            .card-number {
                font-size: 18px;
            }
            .game-board {
                gap: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .card {
                font-size: 16px;
                padding: 6px 10px;
                min-height: 40px;
            }
            .card-number {
                font-size: 16px;
            }
            .timer {
                font-size: 18px;
                padding: 3px 12px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2 style="margin:0">英语词汇消消乐 🎮</h2>
            <div class="timer">时间: <span id="time-val">0</span>s</div>
        </div>
        
        <div class="game-board">
            <div class="column" id="ru-col"></div>
            <div class="column" id="cn-col"></div>
        </div>
    </div>

    <div id="victory-mask">
        <div class="victory-box">
            <h1 style="font-size: 50px; margin: 0;">🎉 太棒了!</h1>
            <p style="font-size: 24px;">挑战用时: <span id="final-time">0</span> 秒</p>
            <button onclick="location.reload()" style="font-size: 24px; padding: 10px 30px; cursor: pointer; border-radius: 15px; border: none; background: var(--active-color);">重新开始</button>
        </div>
    </div>

    <script>
        const wordData = [
            {ru: "1 professional", cn: "adj. 职业的；专业的"},
            {ru: "2 tweezers", cn: "n. 钳子；镊子"},
            {ru: "3 fix", cn: "v. 修理；校准；校正"},
            {ru: "4 army", cn: "n. 军队"},
            {ru: "5 race", cn: "n. 赛跑"},
            {ru: "6 extra", cn: "adj. 额外的"},
            {ru: "7 background", cn: "n. 背景"},
            {ru: "8 scientific", cn: "adj. 科学的"},
            {ru: "9 digitalisation (AmE digitalization)", cn: "n. 数字化"},
            {ru: "10 unwilling", cn: "adj. 不愿意的；不情愿的"},
            {ru: "11 policewoman (pl. policewomen)", cn: "n. 女警察"},
            {ru: "12 postman (pl. postmen)", cn: "n. 邮递员"},
            {ru: "13 boss", cn: "n. 老板"},
            {ru: "14 dentist", cn: "n. 牙科医生"},
            {ru: "15 lawyer", cn: "n. 律师"},
            {ru: "16 fireman (pl. firemen)", cn: "n. 消防队员"},
            {ru: "17 essential", cn: "adj. 完全必要的；必不可少的；极其重要的"},
            {ru: "18 wherever", cn: "conj. 在任何地方；无论哪里"},
            {ru: "19 passport", cn: "n. 护照"},
            {ru: "20 toothbrush", cn: "n. 牙刷"},
            {ru: "21 first-aid", cn: "adj. 急救用的"},
            {ru: "22 kit", cn: "n. 成套装备"},
            {ru: "23 adapter", cn: "n. 适配器"},
            {ru: "24 mobile", cn: "adj. 易于移动的"},
            {ru: "25 mobile phone", cn: "手机"},
            {ru: "26 charger", cn: "n. 充电器"},
            {ru: "27 abroad", cn: "adv. 在国外；到国外"},
            {ru: "28 pack", cn: "v. 收拾（行李）"},
            {ru: "29 worth", cn: "adj. (指运动)值得，有价值；有......价值"},
            {ru: "30 stall", cn: "n. 货摊，摊位，售货亭（尤指集市上的）"},
            {ru: "31 empty", cn: "adj. 空的"},
            {ru: "32 stomach", cn: "n. 胃"},
            {ru: "33 expedition", cn: "n. (短途的) 旅行，出行"},
            {ru: "34 souvenir", cn: "n. 纪念物；纪念品"},
            {ru: "35 inspire", cn: "v. 激励；鼓励"},
            {ru: "36 define", cn: "v. 定义"},
            {ru: "37 hesitate", cn: "v. 犹豫；踌躇"},
            {ru: "38 similarly", cn: "adv. 相似地；类似地；差不多地"},
            {ru: "39 thought", cn: "n. 想法；看法；主意；记忆"},
            {ru: "40 introduction", cn: "n. 初次；首次体验"},
            {ru: "41 invitation", cn: "n. (口头或书面的)邀请"},
            {ru: "42 regular", cn: "adj. 有规律的；定时的"},
            {ru: "43 coffee", cn: "n. 咖啡"},
            {ru: "44 shocked", cn: "adj. 震惊的"},
            {ru: "45 ease", cn: "n. 舒适"},
            {ru: "46 educate", cn: "v. (在学校)教育，教导"},
            {ru: "47 visible", cn: "adj. 明显的"},
            {ru: "48 manner", cn: "n. 方式；方法；举止；态度"},
            {ru: "49 unplanned", cn: "adj. 未计划的(或筹划的)；意外的"},
            {ru: "50 plate", cn: "n. 盘子；碟子"},
            {ru: "51 harmonious", cn: "adj. 友好和睦的；和谐的"},
            {ru: "52 honour (AmE honor)", cn: "v. 尊敬，尊重(某人)"},
            {ru: "53 memorable", cn: "adj. 值得记忆的；难忘的"},
            {ru: "54 shortened", cn: "adj. 缩短的"},
            {ru: "55 version", cn: "n. (电影、译本、乐曲等的)版本，改写本"}
        ];

        let selectedWords = wordData.sort(() => 0.5 - Math.random()).slice(0, 10);
        let ruSelected = null;
        let cnSelected = null;
        let matchesFound = 0;
        let timer = 0;
        let isProcessing = false;

        const timerInterval = setInterval(() => {
            timer++;
            document.getElementById('time-val').innerText = timer;
        }, 1000);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'victory') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initBoard() {
            const ruCol = document.getElementById('ru-col');
            const cnCol = document.getElementById('cn-col');

            const rus = [...selectedWords].sort(() => Math.random() - 0.5);
            const cns = [...selectedWords].sort(() => Math.random() - 0.5);

            rus.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-ru';
                const parts = item.ru.split(' ');
                const number = parts[0];
                const word = parts.slice(1).join(' ');
                card.innerHTML = `<span class="card-number">${number}</span>-<span>${word}</span>`;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'ru');
                ruCol.appendChild(card);
            });

            cns.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-cn';
                card.innerText = item.cn;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'cn');
                cnCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (isProcessing || card.classList.contains('match-success')) return;

            playSound('click');

            if (type === 'ru') {
                if (ruSelected) ruSelected.classList.remove('selected');
                ruSelected = card;
            } else {
                if (cnSelected) cnSelected.classList.remove('selected');
                cnSelected = card;
            }
            card.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (ruSelected && cnSelected) {
                isProcessing = true;
                
                if (ruSelected.dataset.id === cnSelected.dataset.id) {
                    setTimeout(() => {
                        playSound('success');
                        ruSelected.classList.add('match-success');
                        cnSelected.classList.add('match-success');
                        ruSelected = null; cnSelected = null;
                        matchesFound++;
                        isProcessing = false;

                        if (matchesFound === selectedWords.length) winGame();
                    }, 200);
                } else {
                    setTimeout(() => {
                        playSound('error');
                        ruSelected.classList.add('match-error');
                        cnSelected.classList.add('match-error');
                        
                        setTimeout(() => {
                            ruSelected.classList.remove('selected', 'match-error');
                            cnSelected.classList.remove('selected', 'match-error');
                            ruSelected = null; cnSelected = null;
                            isProcessing = false;
                        }, 400);
                    }, 200);
                }
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            playSound('victory');
            document.getElementById('final-time').innerText = timer;
            document.getElementById('victory-mask').style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
