<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词消消乐 - 54词版本</title>
    <style>
        :root {
            --bg-color: #FFFBE6;
            --card-ru-color: #FFECB3;
            --card-cn-color: #E1F5FE;
            --active-color: #FFD54F;
            --success-color: #81C784;
            --error-color: #E57373;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Calibri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 1000px;
            text-align: center;
            border: 5px solid #FFE082;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .timer {
            font-size: 24px;
            background: #FFF9C4;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            font-size: 28px;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            word-break: break-word;
            text-align: center;
        }
        .card-number {
            font-size: 24px;
        }

        .card-ru { background-color: var(--card-ru-color); }
        .card-cn { background-color: var(--card-cn-color); }

        .card:hover { transform: scale(1.03); }
        
        .card.selected {
            background-color: var(--active-color);
            border-color: #FFA000;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.match-success {
            animation: disappear 0.5s forwards;
        }

        .card.match-error {
            background-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes disappear {
            to { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #victory-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .victory-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--active-color);
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .card {
                font-size: 22px;
                padding: 8px 12px;
            }
            .card-number {
                font-size: 20px;
            }
            .game-board {
                gap: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .card {
                font-size: 18px;
                padding: 6px 10px;
                min-height: 40px;
            }
            .card-number {
                font-size: 18px;
            }
            .timer {
                font-size: 18px;
                padding: 3px 12px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2 style="margin:0">英语词汇消消乐 🎮</h2>
            <div class="timer">时间: <span id="time-val">0</span>s</div>
        </div>
        
        <div class="game-board">
            <div class="column" id="ru-col"></div>
            <div class="column" id="cn-col"></div>
        </div>
    </div>

    <div id="victory-mask">
        <div class="victory-box">
            <h1 style="font-size: 50px; margin: 0;">🎉 太棒了!</h1>
            <p style="font-size: 24px;">挑战用时: <span id="final-time">0</span> 秒</p>
            <button onclick="location.reload()" style="font-size: 24px; padding: 10px 30px; cursor: pointer; border-radius: 15px; border: none; background: var(--active-color);">重新开始</button>
        </div>
    </div>

    <script>
        const wordData = [
            {ru: "1 teenage", cn: "adj. 十几岁的（指13至19岁）；青少年的"},
            {ru: "2 counsellor", cn: "n. 顾问"},
            {ru: "3 none", cn: "pron. 没有一个；毫无"},
            {ru: "4 pimple", cn: "n. 粉刺"},
            {ru: "5 stress", cn: "n. 压力"},
            {ru: "6 emotional", cn: "adj. 情感的；情绪的"},
            {ru: "7 behavioural", cn: "adj. 行为的；行为上的"},
            {ru: "8 emotion", cn: "n. 情感；情绪"},
            {ru: "9 peer", cn: "n. 同辈人"},
            {ru: "10 pressure", cn: "n. 心理压力；紧张"},
            {ru: "11 fool", cn: "n. 蠢人；傻瓜"},
            {ru: "12 Christmas", cn: "n. 圣诞节"},
            {ru: "13 counsel", cn: "v. 提供专业咨询"},
            {ru: "14 ugly", cn: "adj. 丑陋的"},
            {ru: "15 duckling", cn: "n. 小鸭子"},
            {ru: "16 tiny", cn: "adj. 微小的"},
            {ru: "17 speak highly of", cn: "赞扬"},
            {ru: "18 struggle", cn: "v. 争斗"},
            {ru: "19 blow", cn: "n. 打击；挫折"},
            {ru: "20 pass away", cn: "去世"},
            {ru: "21 poverty", cn: "n. 贫穷；贫困"},
            {ru: "22 weaver", cn: "n. 织布工；编织工"},
            {ru: "23 ballet", cn: "n. 芭蕾舞"},
            {ru: "24 pay off", cn: "得到回报"},
            {ru: "25 continue", cn: "v. 继续"},
            {ru: "26 appearance", cn: "n. 外表；外貌"},
            {ru: "27 lonely", cn: "adj. 孤独的；寂寞的"},
            {ru: "28 fairy tale", cn: "童话"},
            {ru: "29 bitter", cn: "adj. 苦的"},
            {ru: "30 admit", cn: "v. 承认"},
            {ru: "31 reflection", cn: "n. 反映"},
            {ru: "32 treasure", cn: "n. 极贵重的物品；珍宝"},
            {ru: "33 national treasure", cn: "国宝"},
            {ru: "34 rehearse", cn: "v. 排练；排演"},
            {ru: "35 nervous", cn: "adj. 紧张的"},
            {ru: "36 vox pop", cn: "街头采访"},
            {ru: "37 patient", cn: "adj. 忍耐的；有耐心的"},
            {ru: "38 equipment", cn: "n. 设备；装备"},
            {ru: "39 requirement", cn: "n. 要求；需要条件"},
            {ru: "40 interior", cn: "adj. 内部的"},
            {ru: "41 architecture", cn: "n. 建筑学；建筑术"},
            {ru: "42 delivery", cn: "n. 传送；递送"},
            {ru: "43 journalist", cn: "n. 新闻工作者"},
            {ru: "44 parcel", cn: "n. 包裹"},
            {ru: "45 interviewee", cn: "n. 接受采访者"},
            {ru: "46 chemistry", cn: "n. 化学"},
            {ru: "47 certification", cn: "n. 证明；证明"},
            {ru: "48 organise", cn: "v. 组织；筹备"},
            {ru: "49 restorer", cn: "n. 修复者；修复者"},
            {ru: "50 restoration", cn: "n. （损坏的建筑物、艺术品等的）修复"},
            {ru: "51 period", cn: "n. 一段时间；时期"},
            {ru: "52 due to", cn: "由于；因为"},
            {ru: "53 worm", cn: "n. 虫子；蠕虫"},
            {ru: "54 damp", cn: "n. 湿气；潮湿"}
        ];

        let selectedWords = wordData.sort(() => 0.5 - Math.random()).slice(0, 10);
        let ruSelected = null;
        let cnSelected = null;
        let matchesFound = 0;
        let timer = 0;
        let isProcessing = false;

        const timerInterval = setInterval(() => {
            timer++;
            document.getElementById('time-val').innerText = timer;
        }, 1000);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'victory') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initBoard() {
            const ruCol = document.getElementById('ru-col');
            const cnCol = document.getElementById('cn-col');

            const rus = [...selectedWords].sort(() => Math.random() - 0.5);
            const cns = [...selectedWords].sort(() => Math.random() - 0.5);

            rus.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-ru';
                const parts = item.ru.split(' ');
                const number = parts[0];
                const word = parts.slice(1).join(' ');
                card.innerHTML = `<span class="card-number">${number}</span>-<span>${word}</span>`;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'ru');
                ruCol.appendChild(card);
            });

            cns.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-cn';
                card.innerText = item.cn;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'cn');
                cnCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (isProcessing || card.classList.contains('match-success')) return;

            playSound('click');

            if (type === 'ru') {
                if (ruSelected) ruSelected.classList.remove('selected');
                ruSelected = card;
            } else {
                if (cnSelected) cnSelected.classList.remove('selected');
                cnSelected = card;
            }
            card.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (ruSelected && cnSelected) {
                isProcessing = true;
                
                if (ruSelected.dataset.id === cnSelected.dataset.id) {
                    setTimeout(() => {
                        playSound('success');
                        ruSelected.classList.add('match-success');
                        cnSelected.classList.add('match-success');
                        ruSelected = null; cnSelected = null;
                        matchesFound++;
                        isProcessing = false;

                        if (matchesFound === selectedWords.length) winGame();
                    }, 200);
                } else {
                    setTimeout(() => {
                        playSound('error');
                        ruSelected.classList.add('match-error');
                        cnSelected.classList.add('match-error');
                        
                        setTimeout(() => {
                            ruSelected.classList.remove('selected', 'match-error');
                            cnSelected.classList.remove('selected', 'match-error');
                            ruSelected = null; cnSelected = null;
                            isProcessing = false;
                        }, 400);
                    }, 200);
                }
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            playSound('victory');
            document.getElementById('final-time').innerText = timer;
            document.getElementById('victory-mask').style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
