<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词闪卡 · 基础词汇</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 24px 16px;
            box-sizing: border-box;
            top: 0;
            left: 0;
        }

        .card-front {
            color: var(--primary-color);
            background: linear-gradient(145deg, #ffffff, #f0f3f5);
            position: relative;
            z-index: 2;
        }

        .card-front .word {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
            line-height: 1.2;
        }

        .card-front .index-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a8a9e;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .card-back {
            background: linear-gradient(145deg, #2c6b9e, #1f4b73);
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-back .phonetic {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .card-back .translation {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            max-width: 90%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1 0 auto;
            min-width: 80px;
        }

        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .progress {
            margin-top: 18px;
            color: #4a5b6e;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .hint {
            margin-top: 12px;
            color: #7a8a9e;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                width: 90vw;
                height: 220px;
            }
            .card-front .word {
                font-size: 2.2rem;
            }
            .card-back .translation {
                font-size: 1.6rem;
            }
            button {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-width: 60px;
            }
            .card-front .index-number {
                font-size: 0.7rem;
                top: 8px;
                left: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#2c3e50; font-weight: 400; letter-spacing: 1px;">🇬🇧 英语闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="index-number" id="indexDisplay"></div>
                    <div class="word" id="word-front"></div>
                </div>
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back"></div>
                    <div class="translation" id="translation-back"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">◀ 上一张</button>
            <button onclick="nextCard()">下一张 ▶</button>
            <button onclick="shuffleCards()">🔀 打乱</button>
        </div>

        <div class="progress" id="progress"></div>
        <div class="hint">点击卡片翻转 · 键盘 ← → 翻页 · 空格翻转</div>
    </div>

    <script>
        const words = [
            { num: 1, ru: "reflect", ph: "/rɪ'flekt/", cn: "v. 反射；反映" },
            { num: 2, ru: "golden", ph: "/'ɡəʊldən/", cn: "adj. 金色的；黄金色的" },
            { num: 3, ru: "brick", ph: "/brɪk/", cn: "n. 砖" },
            { num: 4, ru: "construction", ph: "/kən'strʌkʃn/", cn: "n. 建造；建筑物" },
            { num: 5, ru: "craftsmanship", ph: "/'krɑːftsmənʃɪp/", cn: "n. 手艺；技艺" },
            { num: 6, ru: "collection", ph: "/kə'lekʃn/", cn: "n. (常指同类的)收集物，收藏品" },
            { num: 7, ru: "guy", ph: "/ɡaɪ/", cn: "n. 家伙；伙计们" },
            { num: 8, ru: "suburb", ph: "/'sʌbɜːb/", cn: "n. 郊区" },
            { num: 9, ru: "environmentally friendly", ph: "/ɪnˌvaɪrən'mentəli 'frendli/", cn: "adj. 对环境友好的" },
            { num: 10, ru: "pollution", ph: "/pə'luːʃn/", cn: "n. 污染" },
            { num: 11, ru: "loss", ph: "/lɒs/", cn: "n. 损失" },
            { num: 12, ru: "soil", ph: "/sɔɪl/", cn: "n. 土壤" },
            { num: 13, ru: "shark", ph: "/ʃɑːk/", cn: "n. 鲨鱼" },
            { num: 14, ru: "polluted", ph: "/pə'luːtɪd/", cn: "adj. 受污染的；被玷污的" },
            { num: 15, ru: "compare", ph: "/kəm'peə(r)/", cn: "v. 比较；对比" },
            { num: 16, ru: "air conditioner", ph: "/eə kən'dɪʃənə(r)/", cn: "n. 空调" },
            { num: 17, ru: "road", ph: "/rəʊd/", cn: "n. 路；道路；公路" },
            { num: 18, ru: "TV", ph: "/ˌtiː'viː/", cn: "n. 电视；电视机" },
            { num: 19, ru: "spill", ph: "/spɪl/", cn: "n. 溢滥（量）" },
            { num: 20, ru: "mine", ph: "/maɪn/", cn: "v. (在某地)开矿，采矿" },
            { num: 21, ru: "solution", ph: "/sə'luːʃn/", cn: "n. 解决办法；处理手段" },
            { num: 22, ru: "break down", ph: "", cn: "分解" },
            { num: 23, ru: "harmful", ph: "/'hɑːmfl/", cn: "adj. 有害的" },
            { num: 24, ru: "solve", ph: "/sɒlv/", cn: "v. 解决；处理" },
            { num: 25, ru: "remotely", ph: "/rɪ'məʊtli/", cn: "adv. 遥远地" },
            { num: 26, ru: "operate", ph: "/'ɒpəreɪt/", cn: "v. 操作；控制" },
            { num: 27, ru: "vehicle", ph: "/'viːɪkl/", cn: "n. 车辆" },
            { num: 28, ru: "bottom", ph: "/'bɒtəm/", cn: "n. 底部" },
            { num: 29, ru: "unnatural", ph: "/ʌn'nætʃrəl/", cn: "adj. 非自然的" },
            { num: 30, ru: "stand out", ph: "", cn: "显眼" },
            { num: 31, ru: "go after", ph: "", cn: "追求" },
            { num: 32, ru: "expert", ph: "/'ekspɜːt/", cn: "n. 专家" },
            { num: 33, ru: "workshop", ph: "/'wɜːkʃɒp/", cn: "n. 研讨会；讲习班" },
            { num: 34, ru: "university", ph: "/ˌjuːnɪ'vɜːsəti/", cn: "n. 大学" },
            { num: 35, ru: "pick up", ph: "", cn: "学会" },
            { num: 36, ru: "blossom", ph: "/'blɒsəm/", cn: "v. 开花" },
            { num: 37, ru: "peace", ph: "/piːs/", cn: "n. 和平；太平" },
            { num: 38, ru: "proposal", ph: "/prə'pəʊzl/", cn: "n. 建议" },
            { num: 39, ru: "sincerely", ph: "/sɪn'sɪəli/", cn: "adv. (用于正式信函末尾署名前)谨致问候" }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');
        const indexDisplay = document.getElementById('indexDisplay');

        function updateCard() {
            cardElement.classList.remove('flipped');
            const current = words[currentIndex];
            wordFront.textContent = current.ru;
            phoneticBack.textContent = current.ph;
            translationBack.textContent = current.cn;
            indexDisplay.textContent = current.num;
            progressText.textContent = `${currentIndex + 1} / ${words.length}`;
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
