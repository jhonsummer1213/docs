<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡 · 基础词汇</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 24px 16px;
            box-sizing: border-box;
            top: 0;
            left: 0;
        }

        .card-front {
            color: var(--primary-color);
            background: linear-gradient(145deg, #ffffff, #f0f3f5);
            position: relative;
            z-index: 2;
        }

        .card-front .word {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
            line-height: 1.2;
        }

        .card-front .index-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a8a9e;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .card-back {
            background: linear-gradient(145deg, #2c6b9e, #1f4b73);
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-back .phonetic {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .card-back .translation {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            max-width: 90%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1 0 auto;
            min-width: 80px;
        }

        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .progress {
            margin-top: 18px;
            color: #4a5b6e;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .hint {
            margin-top: 12px;
            color: #7a8a9e;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                width: 90vw;
                height: 220px;
            }
            .card-front .word {
                font-size: 2.2rem;
            }
            .card-back .translation {
                font-size: 1.6rem;
            }
            button {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-width: 60px;
            }
            .card-front .index-number {
                font-size: 0.7rem;
                top: 8px;
                left: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#2c3e50; font-weight: 400; letter-spacing: 1px;">🇷🇺 俄语闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="index-number" id="indexDisplay">351</div>
                    <div class="word" id="word-front">сюрприз</div>
                </div>
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back">xiudr-blís</div>
                    <div class="translation" id="translation-back">Surprise 惊喜</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">◀ 上一张</button>
            <button onclick="nextCard()">下一张 ▶</button>
            <button onclick="shuffleCards()">🔀 打乱</button>
        </div>

        <div class="progress" id="progress">1 / 100</div>
        <div class="hint">点击卡片翻转 · 键盘 ← → 翻页 · 空格翻转</div>
    </div>

    <script>
        const rawWords = [
            { ru: "сюрприз", ph: "xiudr-blís", cn: "Surprise 惊喜" },
            { ru: "сосед", ph: "sa-xiét", cn: "邻居" },
            { ru: "ситуация", ph: "xi-duá-ceiə", cn: "Situation 情况" },
            { ru: "зябкий", ph: "zyáp-gi", cn: "怕冷的/寒冷的" },
            { ru: "козёл", ph: "ka-ziol", cn: "山羊" },
            { ru: "зелёный", ph: "zi-lio-neiɪ", cn: "绿色的" },
            { ru: "разить", ph: "ədra-zíqi", cn: "打击；毁灭" },
            { ru: "щёлка", ph: "xio-ka", cn: "小缝；裂缝" },
            { ru: "ребёнок", ph: "", cn: "Child 小孩(单数)" },
            { ru: "дети", ph: "jié-qi", cn: "Children 孩子们(复)" },
            { ru: "кепка", ph: "jiép-ka", cn: "便帽" },
            { ru: "кипа", ph: "kí-ba", cn: "堆、垛、捆、包" },
            { ru: "генеральный", ph: "gi-nye-dál'-nei-ɪ", cn: "一般的，大概的" },
            { ru: "магия", ph: "má-giə", cn: "魔法" },
            { ru: "хедер", ph: "xie-dədr", cn: "header 标题/收割台" },
            { ru: "дача", ph: "dá-qiə", cn: "乡下木屋房" },
            { ru: "клубника", ph: "klub-ní-ga", cn: "草莓" },
            { ru: "лук", ph: "luk", cn: "洋葱/弓/弩/鞠躬" },
            { ru: "свёкла", ph: "sviok-la", cn: "甜菜、甜菜根" },
            { ru: "картошка", ph: "gadr-dój-ga", cn: "土豆" },
            { ru: "морковь", ph: "madr-gófi", cn: "胡萝卜" },
            { ru: "студент", ph: "sdu-jiént", cn: "男学生" },
            { ru: "студентка", ph: "sdu-jiént-ka", cn: "女学生" },
            { ru: "A (y) тебя?", ph: "a-(wu) qi-bia?", cn: "and you? 你呢?" },
            { ru: "A (y) Вас?", ph: "a-(wu) vas?", cn: "你呢(长辈/正式)" },
            { ru: "До Встречи", ph: "da-fs-dlié-qi", cn: "see you 再见" },
            { ru: "тоже", ph: "dó-rə", cn: "also 也" },
            { ru: "очень", ph: "ó-qin", cn: "very 很、非常" },
            { ru: "приятно", ph: "bli-yát-na", cn: "高兴、舒服" },
            { ru: "мне", ph: "mnye", cn: "我" },
            { ru: "давай", ph: "da-vá-yi", cn: "let's 让 拿(叫)来/加油" },
            { ru: "давайте", ph: "da-vá-yi-qie", cn: "让我们开始吧" },
            { ru: "познакомимся", ph: "bazna-gómim-xiə", cn: "认识" },
            { ru: "давайте познакомимся", ph: "", cn: "让我们认识一下吧" },
            { ru: "квас", ph: "kvas", cn: "格瓦丝 饮料" },
            { ru: "пожалуйста", ph: "bará-lus-də", cn: "没事/不客气/请原谅" },
            { ru: "не за что", ph: "nye-za-jdə", cn: "没事/不客气/没问题" },
            { ru: "большое", ph: "bali-jó-ye", cn: "大，非常" },
            { ru: "спасибо", ph: "sba-xí-ba", cn: "谢谢" },
            { ru: "больше спасибо", ph: "", cn: "非常感谢" },
            { ru: "на здоровье", ph: "na zda-dóf-ye", cn: "感谢她给你吃的" },
            { ru: "извини", ph: "iz-vi-ní", cn: "Excuse me 不好意思" },
            { ru: "извините", ph: "iz-vi-ní-qie", cn: "对不起（正式）" },
            { ru: "ничего", ph: "ní-qi-vó", cn: "没关系/啥也没有" },
            { ru: "прости", ph: "bdraxi-jí", cn: "对不起；原谅" },
            { ru: "простите", ph: "bdraxi-jí-qie", cn: "对不起（正式）" },
            { ru: "дайте", ph: "dáyi-qie", cn: "给我..." },
            { ru: "меню", ph: "mi-niu", cn: "菜单" },
            { ru: "кола", ph: "kó-la", cn: "可乐" },
            { ru: "пицца", ph: "bí-tsə", cn: "披萨" }
        ];

        const words = [];
        rawWords.forEach((item, idx) => {
            words.push({ ...item, index: 351 + idx });
        });
        rawWords.forEach((item, idx) => {
            words.push({ ...item, index: 351 + idx });
        });

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');
        const indexDisplay = document.getElementById('indexDisplay');

        function updateCard() {
            cardElement.classList.remove('flipped');
            const current = words[currentIndex];
            if (current) {
                wordFront.textContent = current.ru;
                phoneticBack.textContent = current.ph;
                translationBack.textContent = current.cn;
                indexDisplay.textContent = current.index;
                progressText.textContent = `${currentIndex + 1} / ${words.length}`;
            }
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
