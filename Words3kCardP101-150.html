<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡 · 基础词汇</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 24px 16px;
            box-sizing: border-box;
            top: 0;
            left: 0;
        }

        .card-front {
            color: var(--primary-color);
            background: linear-gradient(145deg, #ffffff, #f0f3f5);
            position: relative;
            z-index: 2;
        }

        .card-front .word {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
            line-height: 1.2;
        }

        .card-front .index-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a8a9e;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .card-back {
            background: linear-gradient(145deg, #2c6b9e, #1f4b73);
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-back .phonetic {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .card-back .translation {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            max-width: 90%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1 0 auto;
            min-width: 80px;
        }

        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .progress {
            margin-top: 18px;
            color: #4a5b6e;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .hint {
            margin-top: 12px;
            color: #7a8a9e;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                width: 90vw;
                height: 220px;
            }
            .card-front .word {
                font-size: 2.2rem;
            }
            .card-back .translation {
                font-size: 1.6rem;
            }
            button {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-width: 60px;
            }
            .card-front .index-number {
                font-size: 0.7rem;
                top: 8px;
                left: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#2c3e50; font-weight: 400; letter-spacing: 1px;">🇷🇺 俄语闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="index-number" id="indexDisplay">101</div>
                    <div class="word" id="word-front">бьк</div>
                </div>
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back">bək</div>
                    <div class="translation" id="translation-back">公牛</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">◀ 上一张</button>
            <button onclick="nextCard()">下一张 ▶</button>
            <button onclick="shuffleCards()">🔀 打乱</button>
        </div>

        <div class="progress" id="progress">1 / 100</div>
        <div class="hint">点击卡片翻转 · 键盘 ← → 翻页 · 空格翻转</div>
    </div>

    <script>
        const rawWords = [
            { ru: "бьк", ph: "bək", cn: "公牛" },
            { ru: "театр", ph: "ji-ádr", cn: "剧院；戏剧场" },
            { ru: "тетрадь", ph: "ji-drá-qi", cn: "练习本" },
            { ru: "тётя", ph: "jió-jia", cn: "阿姨/舅妈/姑" },
            { ru: "яблоко", ph: "yá-bləkə", cn: "苹果" },
            { ru: "язык", ph: "yi-zéik", cn: "语言" },
            { ru: "я", ph: "ya", cn: "我" },
            { ru: "где", ph: "g-jie", cn: "在哪里" },
            { ru: "здесь", ph: "z-jie-xi", cn: "在这里，此刻" },
            { ru: "или", ph: "í-li", cn: "或者；还是" },
            { ru: "не", ph: "n'é", cn: "不" },
            { ru: "нет", ph: "n'et", cn: "不是" },
            { ru: "выход", ph: "vei-had", cn: "出口" },
            { ru: "девочка", ph: "jié-vkəqi-ka", cn: "女孩" },
            { ru: "вокзал", ph: "vag-zál", cn: "火车站" },
            { ru: "журнал", ph: "rud-nál", cn: "杂志" },
            { ru: "карандаш", ph: "kədan-dáĵ", cn: "铅笔" },
            { ru: "карандаши", ph: "kədan-dáfei", cn: "铅笔 (复数)" },
            { ru: "очки", ph: "aqi-gí", cn: "眼镜" },
            { ru: "ложка", ph: "lóĵ-ka", cn: "勺子，匙子" },
            { ru: "молодец", ph: "molə-jié-ts", cn: "好样的 干得好" },
            { ru: "мяч", ph: "mia-qi", cn: "球" },
            { ru: "овощи", ph: "óva-ĵi", cn: "蔬菜" },
            { ru: "ананас", ph: "a-na-nás", cn: "菠萝" },
            { ru: "площадка", ph: "bla-ĵád-kə", cn: "场地" },
            { ru: "площадь", ph: "bló-ji-qi", cn: "广场；面积；空间" },
            { ru: "пиво", ph: "bí-va", cn: "啤酒" },
            { ru: "социализм", ph: "sə-tsə-lízm", cn: "社会主义" },
            { ru: "товарищ", ph: "da-vá-liĵ", cn: "同志" },
            { ru: "учебник", ph: "wu-qiéb-nì-k", cn: "教科书；手册" },
            { ru: "ученик", ph: "wu-qi-nìĭk", cn: "中小学生" },
            { ru: "ученица", ph: "wu-qi-nì-tsa", cn: "女中小学生" },
            { ru: "учитель", ph: "wu-qi-ji-li", cn: "中小学教师" },
            { ru: "учительница", ph: "wu-qi-jil-nì-tsə", cn: "女教师 女老师" },
            { ru: "фотография", ph: "fəda-grá-fia", cn: "摄影 照片 图片" },
            { ru: "цветы", ph: "tsví-déi", cn: "花" },
            { ru: "чудо", ph: "qi-ú-da", cn: "奇迹" },
            { ru: "шофёр", ph: "ja-fiódr", cn: "(汽车)司机" },
            { ru: "щётка", ph: "xiód-ka", cn: "刷子" },
            { ru: "ваш", ph: "vaj", cn: "你们的；您的" },
            { ru: "наш", ph: "naş", cn: "我们的" },
            { ru: "что", ph: "j-do", cn: "什么" },
            { ru: "деревня", ph: "ji-liév-nia", cn: "村庄" },
            { ru: "глаз(а)", ph: "glas(glaza)", cn: "眼睛 (复数)" },
            { ru: "голова", ph: "gəla-vá", cn: "头" },
            { ru: "девушка", ph: "jié-vuĵ-ka", cn: "小姐 姑娘 女朋友" },
            { ru: "алло", ph: "a-ló", cn: "你好 (电话“喂”)" },
            { ru: "дерево", ph: "jié-li-va", cn: "树；木材" },
            { ru: "директор", ph: "ji-liék-dr", cn: "校(院)长；经理" },
            { ru: "зуб", ph: "zup", cn: "牙齿" }
        ];

        const words = [];
        rawWords.forEach((item, idx) => {
            words.push({ ...item, index: 101 + idx });
        });
        rawWords.forEach((item, idx) => {
            words.push({ ...item, index: 101 + idx });
        });

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');
        const indexDisplay = document.getElementById('indexDisplay');

        function updateCard() {
            cardElement.classList.remove('flipped');
            const current = words[currentIndex];
            if (current) {
                wordFront.textContent = current.ru;
                phoneticBack.textContent = current.ph;
                translationBack.textContent = current.cn;
                indexDisplay.textContent = current.index;
                progressText.textContent = `${currentIndex + 1} / ${words.length}`;
            }
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
