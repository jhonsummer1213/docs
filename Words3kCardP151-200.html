<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡 · 基础词汇</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 24px 16px;
            box-sizing: border-box;
            top: 0;
            left: 0;
        }

        .card-front {
            color: var(--primary-color);
            background: linear-gradient(145deg, #ffffff, #f0f3f5);
            position: relative;
            z-index: 2;
        }

        .card-front .word {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
            line-height: 1.2;
        }

        .card-front .index-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a8a9e;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .card-back {
            background: linear-gradient(145deg, #2c6b9e, #1f4b73);
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-back .phonetic {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .card-back .translation {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            max-width: 90%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1 0 auto;
            min-width: 80px;
        }

        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .progress {
            margin-top: 18px;
            color: #4a5b6e;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .hint {
            margin-top: 12px;
            color: #7a8a9e;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                width: 90vw;
                height: 220px;
            }
            .card-front .word {
                font-size: 2.2rem;
            }
            .card-back .translation {
                font-size: 1.6rem;
            }
            button {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-width: 60px;
            }
            .card-front .index-number {
                font-size: 0.7rem;
                top: 8px;
                left: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#2c3e50; font-weight: 400; letter-spacing: 1px;">🇷🇺 俄语闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="index-number" id="indexDisplay"></div>
                    <div class="word" id="word-front"></div>
                </div>
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back"></div>
                    <div class="translation" id="translation-back"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">◀ 上一张</button>
            <button onclick="nextCard()">下一张 ▶</button>
            <button onclick="shuffleCards()">🔀 打乱</button>
        </div>

        <div class="progress" id="progress"></div>
        <div class="hint">点击卡片翻转 · 键盘 ← → 翻页 · 空格翻转</div>
    </div>

    <script>
        const words = [
            { num: 151, ru: "инженер", ph: "inzh-ní-ədr", cn: "工程师" },
            { num: 152, ru: "лес", ph: "lie-s", cn: "森林" },
            { num: 153, ru: "лицо", ph: "li-tsó", cn: "脸" },
            { num: 154, ru: "нос", ph: "nos", cn: "鼻子" },
            { num: 155, ru: "рот", ph: "rot", cn: "嘴, 口" },
            { num: 156, ru: "человек", ph: "che-lo-vék", cn: "人; 人类" },
            { num: 157, ru: "люди", ph: "liú-di", cn: "人(复数)" },
            { num: 158, ru: "лампа", ph: "lám-pa", cn: "灯" },
            { num: 159, ru: "лампы", ph: "lám-py", cn: "灯(复数)" },
            { num: 160, ru: "публика", ph: "púb-li-ka", cn: "读者; 观众" },
            { num: 161, ru: "пэтэушник", ph: "pé-tu-ush-nik", cn: "技校生/中专生" },
            { num: 162, ru: "боб", ph: "bob", cn: "豆子" },
            { num: 163, ru: "буфет", ph: "bu-fét", cn: "小吃馆; 食堂" },
            { num: 164, ru: "здравствуйте", ph: "zdrás-vui-tye", cn: "您们好(复数)" },
            { num: 165, ru: "Здравствуй!", ph: "zdrás-vui", cn: "你好!" },
            { num: 166, ru: "до свидания", ph: "do svi-dá-ni-ya", cn: "再见(正式)" },
            { num: 167, ru: "Доброе утро", ph: "dó-bro-ye ú-tro", cn: "早安; 早上好" },
            { num: 168, ru: "Добрый день", ph: "dó-bryy dyen", cn: "中午好!" },
            { num: 169, ru: "Добрый вечер", ph: "dó-bryy vye-cher", cn: "晚上好" },
            { num: 170, ru: "спокойной ночи", ph: "spa-kóy-noy nó-chi", cn: "晚安" },
            { num: 171, ru: "тут", ph: "tut", cn: "这里/在这儿" },
            { num: 172, ru: "там", ph: "tam", cn: "在那边; 以后" },
            { num: 173, ru: "же", ph: "zhe", cn: "同样; 又; 已经" },
            { num: 174, ru: "а", ph: "a", cn: "而" },
            { num: 175, ru: "фото", ph: "fó-to", cn: "照片" },
            { num: 176, ru: "приятель", ph: "pri-yá-tel", cn: "普通朋友" },
            { num: 177, ru: "парень", ph: "pa-ren", cn: "男朋友" },
            { num: 178, ru: "тебя", ph: "ti-bya", cn: "你(阳性)" },
            { num: 179, ru: "есть", ph: "yest", cn: "吃; 有/存在" },
            { num: 180, ru: "женщина", ph: "zhen-shchi-na", cn: "女士(中年)" },
            { num: 181, ru: "сок", ph: "sok", cn: "果汁; 汁液" },
            { num: 182, ru: "суп", ph: "sup", cn: "汤" },
            { num: 183, ru: "зонт", ph: "zont", cn: "雨伞" },
            { num: 184, ru: "ваза", ph: "vá-za", cn: "花瓶" },
            { num: 185, ru: "рис", ph: "ris", cn: "米饭; 稻米; 大米" },
            { num: 186, ru: "сыр", ph: "syr", cn: "奶酪; 起司" },
            { num: 187, ru: "шапка", ph: "sháp-ka", cn: "帽子" },
            { num: 188, ru: "шарф", ph: "sharf", cn: "围巾" },
            { num: 189, ru: "машина", ph: "ma-shí-na", cn: "汽车" },
            { num: 190, ru: "муж", ph: "muzh", cn: "丈夫; 老公" },
            { num: 191, ru: "жена", ph: "zhe-ná", cn: "妻子; 老婆" },
            { num: 192, ru: "ещё", ph: "yesh-chó", cn: "还; 再" },
            { num: 193, ru: "цифра", ph: "tsíf-ra", cn: "数字" },
            { num: 194, ru: "цирк", ph: "tsirk", cn: "马戏团" },
            { num: 195, ru: "центр", ph: "tsen-tr", cn: "中心" },
            { num: 196, ru: "интересно", ph: "in-ti-res-na", cn: "有趣" },
            { num: 197, ru: "паспорт", ph: "pas-port", cn: "护照" },
            { num: 198, ru: "чёрт", ph: "chyort", cn: "(见)鬼; 该死的" },
            { num: 199, ru: "чай", ph: "chay", cn: "茶" },
            { num: 200, ru: "кофе", ph: "ko-fé", cn: "咖啡" }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');
        const indexDisplay = document.getElementById('indexDisplay');

        function updateCard() {
            cardElement.classList.remove('flipped');
            const current = words[currentIndex];
            wordFront.textContent = current.ru;
            phoneticBack.textContent = current.ph;
            translationBack.textContent = current.cn;
            indexDisplay.textContent = current.num;
            progressText.textContent = `${current.num} / ${words.length + 150}`;
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
