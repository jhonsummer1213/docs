<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡 · 基础词汇</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 24px 16px;
            box-sizing: border-box;
            top: 0;
            left: 0;
        }

        .card-front {
            color: var(--primary-color);
            background: linear-gradient(145deg, #ffffff, #f0f3f5);
            position: relative;
            z-index: 2;
        }

        .card-front .word {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
            line-height: 1.2;
        }

        .card-front .index-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a8a9e;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .card-back {
            background: linear-gradient(145deg, #2c6b9e, #1f4b73);
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-back .phonetic {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .card-back .translation {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            max-width: 90%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1 0 auto;
            min-width: 80px;
        }

        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .progress {
            margin-top: 18px;
            color: #4a5b6e;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .hint {
            margin-top: 12px;
            color: #7a8a9e;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                width: 90vw;
                height: 220px;
            }
            .card-front .word {
                font-size: 2.2rem;
            }
            .card-back .translation {
                font-size: 1.6rem;
            }
            button {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-width: 60px;
            }
            .card-front .index-number {
                font-size: 0.7rem;
                top: 8px;
                left: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#2c3e50; font-weight: 400; letter-spacing: 1px;">🇷🇺 俄语闪卡</h1>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="index-number" id="indexDisplay">301</div>
                    <div class="word" id="word-front">бэби</div>
                </div>
                <div class="card-face card-back">
                    <div class="phonetic" id="phonetic-back">be-bie</div>
                    <div class="translation" id="translation-back">Baby 宝宝/婴儿</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">◀ 上一张</button>
            <button onclick="nextCard()">下一张 ▶</button>
            <button onclick="shuffleCards()">🔀 打乱</button>
        </div>

        <div class="progress" id="progress">1 / 100</div>
        <div class="hint">点击卡片翻转 · 键盘 ← → 翻页 · 空格翻转</div>
    </div>

    <script>
        const rawWords = [
            { ru: "бэби", ph: "be-bie", cn: "Baby 宝宝/婴儿" },
            { ru: "быть", ph: "bei-qi", cn: "在；是" },
            { ru: "фабрика", ph: "fá-bli-ka", cn: "工厂 (轻工业)" },
            { ru: "фокус", ph: "fó-kus", cn: "焦点" },
            { ru: "фэйл", ph: "feil", cn: "Fail失败" },
            { ru: "файл", ph: "file", cn: "File文件" },
            { ru: "вовремя", ph: "vóv-li-miə", cn: "及时" },
            { ru: "вуз", ph: "vus", cn: "高校" },
            { ru: "ветер/вэр(简写)", ph: "vié-qi-rdr / viep", cn: "风；微风" },
            { ru: "таблица", ph: "da-blí-cə", cn: "表格" },
            { ru: "интернет", ph: "indr-net", cn: "互联网" },
            { ru: "до", ph: "do", cn: "在...之前" },
            { ru: "думать", ph: "dú-mə-qi", cn: "想" },
            { ru: "конечно", ph: "ka-nʲé-ʃ-na", cn: "Certainly 当然" },
            { ru: "соус", ph: "só-wus", cn: "调味汁" },
            { ru: "сэр", ph: "sei-dr", cn: "先生；爵士" },
            { ru: "зов", ph: "zof", cn: "号召" },
            { ru: "зыбь", ph: "zei-pi", cn: "涟漪/微波/细浪" },
            { ru: "шаг", ph: "jak", cn: "脚步; 步幅" },
            { ru: "шоу", ph: "jou", cn: "表演" },
            { ru: "шутка", ph: "jút-ka", cn: "笑话" },
            { ru: "жох", ph: "ro-h", cn: "狡猾的人；滑头" },
            { ru: "цоколь", ph: "co-gə-li", cn: "底座/灯座/灯头" },
            { ru: "французский", ph: "flan-cús-gi", cn: "法语/法国(人)的" },
            { ru: "цыпка", ph: "ceip-ka", cn: "母鸡" },
            { ru: "щадить", ph: "fi-ji-qi", cn: "宽恕/空闲的/节省" },
            { ru: "щунять", ph: "xiu-nia-qi", cn: "责备/训斥" },
            { ru: "чопорный", ph: "qió-badr-neiɪ", cn: "隆重的" },
            { ru: "кукушка", ph: "gugú-ʃ-ga", cn: "布谷鸟/杜鹃鸟" },
            { ru: "характер", ph: "ha-dák-jie-dr", cn: "性格" },
            { ru: "хобби", ph: "hó-bi", cn: "业余爱好；嗜好" },
            { ru: "художник", ph: "hu-dóri-nʲi-k", cn: "艺术家，画家" },
            { ru: "мёт", ph: "miot", cn: "蜂蜜，蜜酒" },
            { ru: "сожалеть", ph: "sə-rei-lié-qi", cn: "遗憾/抱歉/后悔" },
            { ru: "минута", ph: "mi-nú-da", cn: "分钟" },
            { ru: "нёбо", ph: "nyo-ba", cn: "颚/味蕾" },
            { ru: "нюх", ph: "nyu-h", cn: "嗅觉/香气/风采" },
            { ru: "низкий", ph: "nʲís-gi", cn: "矮的/低沉/微弱" },
            { ru: "ряд", ph: "ədiat", cn: "行；列" },
            { ru: "рёв", ph: "ədiof", cn: "怒吼，嚎叫" },
            { ru: "рюмка", ph: "ədúm-ka", cn: "高脚酒杯" },
            { ru: "решать", ph: "ədi-ʃá-qi", cn: "决定" },
            { ru: "тяжкий", ph: "jiá-ʃ-gi", cn: "重的/困难" },
            { ru: "тюлень", ph: "ju-lín", cn: "海豹/密封/印章" },
            { ru: "тип", ph: "jip", cn: "种类/型号" },
            { ru: "сдёргивать", ph: "z-jiodr-gi-vaqi", cn: "拉下来/拉动" },
            { ru: "дюна", ph: "jiú-na", cn: "沙丘" },
            { ru: "диплом", ph: "ji-plóm", cn: "证书/奖品" },
            { ru: "ой, всё", ph: "oɪ f-xiu", cn: "哎呀，算了！" },
            { ru: "весёлый", ph: "vi-xio-leiɪ", cn: "开心的/好玩的" }
        ];

        const words = [];
        rawWords.forEach((item, idx) => {
            words.push({ ...item, index: 301 + idx });
        });
        rawWords.forEach((item, idx) => {
            words.push({ ...item, index: 301 + idx });
        });

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const wordFront = document.getElementById('word-front');
        const phoneticBack = document.getElementById('phonetic-back');
        const translationBack = document.getElementById('translation-back');
        const progressText = document.getElementById('progress');
        const indexDisplay = document.getElementById('indexDisplay');

        function updateCard() {
            cardElement.classList.remove('flipped');
            const current = words[currentIndex];
            if (current) {
                wordFront.textContent = current.ru;
                phoneticBack.textContent = current.ph;
                translationBack.textContent = current.cn;
                indexDisplay.textContent = current.index;
                progressText.textContent = `${currentIndex + 1} / ${words.length}`;
            }
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
