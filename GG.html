<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词闪卡</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-front: #ffffff;
            --card-back: #eef5fc;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 5px;
            font-size: 24px;
        }

        .progress {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        /* 闪卡 3D 翻转容器 */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 正面样式 */
        .card-front {
            background-color: var(--card-front);
            color: var(--text-color);
            border: 2px solid #e1e8ed;
        }

        .word-russian {
            font-size: 38px;
            font-weight: bold;
            letter-spacing: 1px;
            word-break: break-word;
        }

        /* 背面样式 */
        .card-back {
            background-color: var(--card-back);
            color: var(--text-color);
            transform: rotateY(180deg);
            border: 2px solid var(--primary-color);
        }

        .word-ipa {
            font-size: 22px;
            color: #d9534f;
            margin-bottom: 20px;
            font-family: 'Lucida Sans Unicode', sans-serif;
        }

        .word-chinese {
            font-size: 24px;
            font-weight: 500;
            line-height: 1.4;
            color: #2c3e50;
        }

        .hint {
            position: absolute;
            bottom: 15px;
            font-size: 12px;
            color: #999;
        }

        /* 按钮样式 */
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>俄语单词课外闪卡</h1>
    <div class="progress" id="progress">加载中...</div>

    <div class="flashcard-wrapper" onclick="flipCard()">
        <div class="flashcard" id="card">
            <!-- 正面：俄语 -->
            <div class="card-face card-front">

                <div class="hint">点击卡片查看背面</div>
            </div>

                <div class="word-chinese" id="back-chinese">有趣的/好玩的</div>
                <div class="hint">点击卡片返回正面</div>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard()">上一题</button>

</div>
