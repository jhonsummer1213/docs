<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语单词消消乐 - P1-50 版本</title>
    <style>
        :root {
            --bg-color: #FFFBE6;
            --card-ru-color: #FFECB3;
            --card-cn-color: #E1F5FE;
            --active-color: #FFD54F;
            --success-color: #81C784;
            --error-color: #E57373;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Calibri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 1000px;
            text-align: center;
            border: 5px solid #FFE082;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .timer {
            font-size: 24px;
            background: #FFF9C4;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            font-size: 32px;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card-number {
            font-size: 24px;
        }

        .card-ru { background-color: var(--card-ru-color); }
        .card-cn { background-color: var(--card-cn-color); }

        .card:hover { transform: scale(1.03); }
        
        .card.selected {
            background-color: var(--active-color);
            border-color: #FFA000;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.match-success {
            animation: disappear 0.5s forwards;
        }

        .card.match-error {
            background-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes disappear {
            to { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #victory-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .victory-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--active-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2 style="margin:0">俄语词汇消消乐 🎮</h2>
            <div class="timer">时间: <span id="time-val">0</span>s</div>
        </div>
        
        <div class="game-board">
            <div class="column" id="ru-col"></div>
            <div class="column" id="cn-col"></div>
        </div>
    </div>

    <div id="victory-mask">
        <div class="victory-box">
            <h1 style="font-size: 50px; margin: 0;">🎉 太棒了!</h1>
            <p style="font-size: 24px;">挑战用时: <span id="final-time">0</span> 秒</p>
            <button onclick="location.reload()" style="font-size: 24px; padding: 10px 30px; cursor: pointer; border-radius: 15px; border: none; background: var(--active-color);">重新开始</button>
        </div>
    </div>

    <script>
        const wordData = [
            {ru: "1 бумага", cn: "纸"}, {ru: "2 дом", cn: "房子"}, {ru: "3 кино́", cn: "电影"},
            {ru: "4 окно́", cn: "窗户"}, {ru: "5 книга(ги)", cn: "书（复数）"}, {ru: "6 комната", cn: "房间"},
            {ru: "7 нога", cn: "腿, 脚"}, {ru: "8 кинотеатр", cn: "电影院"}, {ru: "9 погода", cn: "天气"},
            {ru: "10 кто", cn: "谁"}, {ru: "11 мы", cn: "我们"}, {ru: "12 она", cn: "她"},
            {ru: "13 они", cn: "他们"}, {ru: "14 оно", cn: "它"}, {ru: "15 тот", cn: "那个"},
            {ru: "16 ты", cn: "你"}, {ru: "17 это", cn: "这 这是"}, {ru: "18 этот", cn: "这个"},
            {ru: "19 и", cn: "和"}, {ru: "20 дома", cn: "在家里"}, {ru: "21 много", cn: "许多"},
            {ru: "22 тихо", cn: "小声地/宁静地"}, {ru: "23 да", cn: "是/是的"}, {ru: "24 пока", cn: "再见"},
            {ru: "25 когда", cn: "当...什么时候"}, {ru: "26 говорить", cn: "说/说话(未成完时态)"}, {ru: "27 мышь", cn: "老鼠"},
            {ru: "28 вино", cn: "酒; 葡萄酒"}, {ru: "29 внук", cn: "孙子"}, {ru: "30 гора", cn: "山"},
            {ru: "31 доктор", cn: "医生/博士"}, {ru: "32 игра", cn: "游戏/比赛"}, {ru: "33 карта", cn: "地图"},
            {ru: "34 картина", cn: "画/图片/电影"}, {ru: "35 климат", cn: "气候"}, {ru: "36 мэр", cn: "市长"},
            {ru: "37 лифт", cn: "电梯"}, {ru: "38 луна", cn: "月亮"}, {ru: "39 парк", cn: "公园"},
            {ru: "40 молоко", cn: "牛奶"}, {ru: "41 парта", cn: "课桌"}, {ru: "42 пол", cn: "地板"},
            {ru: "43 рука", cn: "手/臂"}, {ru: "44 рыба", cn: "鱼"}, {ru: "45 тигр", cn: "老虎"},
            {ru: "46 торт", cn: "蛋糕"}, {ru: "47 урок", cn: "课"}, {ru: "48 вода", cn: "水"},
            {ru: "49 фрукты", cn: "水果（复数）"}, {ru: "50 вкусно", cn: "好吃, 美味"}
        ];

        let selectedWords = wordData.sort(() => 0.5 - Math.random()).slice(0, 10);
        let ruSelected = null;
        let cnSelected = null;
        let matchesFound = 0;
        let timer = 0;
        let isProcessing = false;

        const timerInterval = setInterval(() => {
            timer++;
            document.getElementById('time-val').innerText = timer;
        }, 1000);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'victory') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initBoard() {
            const ruCol = document.getElementById('ru-col');
            const cnCol = document.getElementById('cn-col');

            const rus = [...selectedWords].sort(() => Math.random() - 0.5);
            const cns = [...selectedWords].sort(() => Math.random() - 0.5);

            rus.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-ru';
                const parts = item.ru.split(' ');
                const number = parts[0];
                const word = parts.slice(1).join(' ');
                card.innerHTML = `<span class="card-number">${number}</span>-<span>${word}</span>`;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'ru');
                ruCol.appendChild(card);
            });

            cns.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card card-cn';
                card.innerText = item.cn;
                card.dataset.id = item.ru;
                card.onclick = () => selectCard(card, 'cn');
                cnCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (isProcessing || card.classList.contains('match-success')) return;

            playSound('click');

            if (type === 'ru') {
                if (ruSelected) ruSelected.classList.remove('selected');
                ruSelected = card;
            } else {
                if (cnSelected) cnSelected.classList.remove('selected');
                cnSelected = card;
            }
            card.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (ruSelected && cnSelected) {
                isProcessing = true;
                
                if (ruSelected.dataset.id === cnSelected.dataset.id) {
                    setTimeout(() => {
                        playSound('success');
                        ruSelected.classList.add('match-success');
                        cnSelected.classList.add('match-success');
                        ruSelected = null; cnSelected = null;
                        matchesFound++;
                        isProcessing = false;

                        if (matchesFound === selectedWords.length) winGame();
                    }, 200);
                } else {
                    setTimeout(() => {
                        playSound('error');
                        ruSelected.classList.add('match-error');
                        cnSelected.classList.add('match-error');
                        
                        setTimeout(() => {
                            ruSelected.classList.remove('selected', 'match-error');
                            cnSelected.classList.remove('selected', 'match-error');
                            ruSelected = null; cnSelected = null;
                            isProcessing = false;
                        }, 400);
                    }, 200);
                }
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            playSound('victory');
            document.getElementById('final-time').innerText = timer;
            document.getElementById('victory-mask').style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
